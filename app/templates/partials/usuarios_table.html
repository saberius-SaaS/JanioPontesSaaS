{% if erro %}
<tr class="bg-red-50"><td colspan="5" class="px-4 py-3 text-red-600 text-sm"><i class="fa-solid fa-triangle-exclamation mr-2"></i> {{ erro }}</td></tr>
{% endif %}

{% for u in usuarios %}
<tr class="hover:bg-slate-50 transition-colors">
    <td class="px-4 py-3 font-medium text-slate-800">{{ u.nome }}</td>
    <td class="px-4 py-3">{{ u.email }}</td>
    <td class="px-4 py-3">
        <span class="px-2.5 py-1 text-[10px] font-bold rounded-full uppercase {% if u.nivel == 'ADMIN' or u.nivel == 'MASTER' %}bg-purple-100 text-purple-700{% else %}bg-blue-100 text-blue-700{% endif %}">
            {{ u.nivel }}
        </span>
    </td>
    <td class="px-4 py-3">
        {% if u.ativo %}
            <span class="text-emerald-500 text-xs font-bold uppercase"><i class="fa-solid fa-circle text-[8px] mr-1"></i> Ativo</span>
        {% else %}
            <span class="text-red-500 text-xs font-bold uppercase"><i class="fa-solid fa-circle text-[8px] mr-1"></i> Inativo</span>
        {% endif %}
    </td>
    <td class="px-4 py-3 text-right space-x-2">
        <button class="text-indigo-500 hover:text-indigo-700 transition-colors"><i class="fa-solid fa-pen-to-square"></i></button>
    </td>
</tr>
{% else %}
<tr>
    <td colspan="5" class="px-4 py-8 text-center text-slate-400 text-sm">Nenhum usuário encontrado.</td>
</tr>
{% endfor %}
