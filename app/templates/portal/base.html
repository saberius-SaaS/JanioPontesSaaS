<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portal do Cliente - Janio Pontes{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'jp-navy': '#1C3051',
                        'jp-gold': '#D4AF37',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Topbar -->
    <header class="bg-jp-navy text-white shadow-md relative z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <img src="/static/logo.jpg" alt="Logo" class="h-10 w-auto rounded-md shadow-sm border border-slate-600">
                    <div class="hidden sm:block">
                        <h1 class="font-bold text-lg tracking-wider text-white">Portal do Cliente</h1>
                        <p class="text-[10px] text-slate-300 uppercase tracking-widest">{{ cliente }}</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/portal/logout" class="text-xs text-slate-300 hover:text-white font-semibold transition-colors flex items-center">
                        <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i> Sair
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col md:flex-row gap-6">
        
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 flex-shrink-0">
            <nav class="glass-panel rounded-2xl overflow-hidden sticky top-8">
                <div class="p-5 border-b border-slate-100 bg-slate-50/50">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Menu Principal</h2>
                </div>
                <div class="p-3 space-y-1">
                    <a href="/portal" class="flex items-center px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-indigo-50 hover:text-indigo-700 rounded-xl transition-all group">
                        <i class="fa-solid fa-house w-6 text-slate-400 group-hover:text-indigo-500 transition-colors"></i> 
                        Início
                    </a>
                    <a href="#" class="flex items-center px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-indigo-50 hover:text-indigo-700 rounded-xl transition-all group opacity-50 cursor-not-allowed" title="Em breve">
                        <i class="fa-solid fa-folder-open w-6 text-slate-400 group-hover:text-indigo-500 transition-colors"></i> 
                        Repositório Legal
                    </a>
                    <a href="#" class="flex items-center px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-indigo-50 hover:text-indigo-700 rounded-xl transition-all group opacity-50 cursor-not-allowed" title="Em breve">
                        <i class="fa-solid fa-headset w-6 text-slate-400 group-hover:text-indigo-500 transition-colors"></i> 
                        Atendimento
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Content Area -->
        <main class="flex-1 min-w-0">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center">
            <p class="text-xs text-slate-400 font-medium">Janio Pontes Contabilidade &copy; 2026. Todos os direitos reservados.</p>
        </div>
    </footer>

</body>
</html>
