{% extends "base.html" %}

{% block title %}Central de Atendimento - Janio Pontes SaaS{% endblock %}
{% block page_title %}Central de Atendimento{% endblock %}

{% block head %}
<style>
  /* Remove o padding do container principal para o iframe ocupar tudo */
  .view-section {
    padding: 0 !important;
    height: 100% !important;
    display: flex !important;
    flex-direction: column;
  }
</style>
{% endblock %}

{% block content %}
<div class="w-full h-[calc(100vh-3.5rem)] bg-white relative">
  <!-- Loader spinner enquanto o iframe carrega -->
  <div id="iframe-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-50 z-10">
    <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
    <p class="text-slate-500 font-medium text-sm">Conectando ao Helpdesk...</p>
  </div>

  <iframe 
    src="{{ chatwoot_url }}/app/login" 
    class="w-full h-full border-0 absolute inset-0 z-20"
    onload="document.getElementById('iframe-loader').style.display = 'none';"
    allow="camera; microphone; fullscreen; display-capture; picture-in-picture; clipboard-write"
  ></iframe>
</div>
{% endblock %}
