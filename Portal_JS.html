<script>
/**
 * Portal_JS.html | Lógica de Interface do Cliente
 * Single Page Application Controller
 */

window.GIS_TOKEN = window.INITIAL_TOKEN || null; // Token de Segurança do GIS (pode vir via Redirect)
const GOOGLE_CLIENT_ID = window.GOOGLE_CLIENT_ID;

// Callback do Google Identity Services (Executado no modo Popup ou manualmente no Redirect)
function handleCredentialResponse(response) {
   if (response && response.credential) {
      window.GIS_TOKEN = response.credential;
      const fb = document.getElementById('gisFeedback');
      if (fb) {
         fb.classList.remove('hidden', 'bg-red-50', 'text-red-600');
         fb.classList.add('bg-emerald-50', 'text-emerald-600');
         fb.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Autenticado. Carregando seus dados...';
      }
      
      // Tenta decodificar o e-mail no cliente apenas para exibição inicial
      try {
         const payload = JSON.parse(atob(response.credential.split('.')[1]));
         if (payload && payload.email) {
            document.getElementById('currentUserEmail').textContent = payload.email.toLowerCase();
            setAvatarInitials(payload.email);
         }
      } catch (e) {}
      
      // Esconde o botão e inicia a autorização com o backend
      document.getElementById('gisButtonContainer').classList.add('hidden');
      carregarDadosBase();
   }
}

// Inicialização do Google Identity Services Onload
window.onload = function () {
   if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.indexOf('SEU_CLIENT_ID_AQUI') > -1) {
      const fb = document.getElementById('gisFeedback');
      fb.classList.remove('hidden');
      fb.className = "text-xs font-bold px-4 py-3 rounded mb-4 bg-orange-100 text-orange-700 border border-orange-200 relative z-10 w-full text-center";
      fb.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-2"></i> Client ID não configurado no servidor. O Login está desabilitado.';
      return;
   }

   // 🚀 Se já temos um token (vindo do Redirect), processamos ele direto
   if (window.GIS_TOKEN) {
      handleCredentialResponse({ credential: window.GIS_TOKEN });
      return;
   }
   
   google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      ux_mode: 'redirect',
      login_uri: window.SCRIPT_URL,
      auto_select: true, // Tenta logar automaticamente caso tenha apenas 1 conta
      cancel_on_tap_outside: false
   });
   
   google.accounts.id.renderButton(
      document.getElementById("gisButtonContainer"),
      { theme: "outline", size: "large", type: "standard", shape: "pill", width: 280 }
   );
};

// Ao carregar a página
document.addEventListener("DOMContentLoaded", function(event) {
    document.getElementById('currentUserEmail').textContent = "Aguardando Login...";
    // O carregamento agora é engatilhado apenas APÓS o login (handleCredentialResponse)
    
    // Configura sincronização periódica (30 segundos) - Mas checa se o token existe primeiro
    setInterval(() => {
        if (window.GIS_TOKEN) carregarDadosBase(true);
    }, 30000);
});

let tarefasGlobaisBase = []; // Cache das tarefas para busca Local
let historicoGlobalBase = []; // Cache do arquivo morto
window.userDataGlobal = null; // Armazena nível e e-mail do usuário logado
window.currentView = 'dashboard'; 

// ═══════════════ UTILITÁRIOS PREMIUM ═══════════════
function debounce(fn, delay) {
  let timer;
  return function() {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, arguments), delay);
  };
}

const _debouncedTarefas = debounce(() => filtrarTarefasWeb(), 300);
function debounceTarefas() { _debouncedTarefas(); }

const _debouncedHistorico = debounce(() => filtrarHistoricoWeb(), 300);
function debounceHistorico() { _debouncedHistorico(); }

const _debouncedSolicitacoes = debounce(() => filtrarSolicitacoesWeb(), 300);
function debounceSolicitacoes() { _debouncedSolicitacoes(); }

const _debouncedProtocolos = debounce(() => filtrarProtocolosHistorico(), 300);
function debounceProtocolos() { _debouncedProtocolos(); }

function animateCounter(el, target) {
  const num = parseInt(target, 10);
  if (isNaN(num)) { el.textContent = target; return; }
  const duration = 600;
  const start = performance.now();
  const from = 0;
  function step(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(from + (num - from) * eased);
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebarEl');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('active');
}

function setAvatarInitials(email) {
  const av = document.getElementById('avatarUser');
  if (!av || !email) return;
  const parts = email.split('@')[0].split(/[._-]/);
  let initials = parts.length >= 2 
    ? (parts[0][0] + parts[1][0]).toUpperCase() 
    : parts[0].substring(0, 2).toUpperCase();
  av.innerHTML = initials;
}


/**
 * Realiza Fetch das Vistas Iniciais (Sub-segundo / Single Request)
 */
function carregarDadosBase(isAutoSync) {
    const txtSync = document.getElementById('txtLastSync');
    const agora = new Date().toLocaleTimeString('pt-BR');

    if (isAutoSync === true) {
        // Proteção de Trabalho: Não refrescar se estiver no CRM ou Modal aberto
        const currentView = document.querySelector('.view-content:not(.hidden)')?.id;
        if (currentView === 'comunicacao' || (typeof tarefaEmFoco !== 'undefined' && tarefaEmFoco !== null)) {
            if (txtSync) txtSync.textContent = agora; // Atualiza o relógio para mostrar que o sistema está operante
            return;
        }
    }

    google.script.run
      .withFailureHandler(function(err) {
         console.error(err);
         document.getElementById('currentUserEmail').textContent = "Falha!";
      })
      .withSuccessHandler(function(res) {
          if(!res.success) {
             if (res.error === "SISTEMA_BLOQUEADO" || res.error === "LOGIN_REQUERIDO") {
                 const overlay = document.getElementById('overlayBloqueio');
                 const msg = document.getElementById('msgBloqueio');
                 const title = overlay.querySelector('h2');
                 const icon = overlay.querySelector('i');

                 overlay.classList.remove('hidden');
                 msg.textContent = res.message;
                 
                 if (res.error === "LOGIN_REQUERIDO") {
                     title.textContent = "Login Necessário";
                     icon.className = "fa-solid fa-user-lock text-4xl";
                 }

                 document.querySelector('aside').classList.add('hidden'); // Esconde sidebar
                 document.querySelector('main').classList.add('hidden');  // Esconde conteúdo
             }
             console.error("Erro Backend:", res.error);
             return;
          }
          
          if (txtSync) txtSync.textContent = agora;
          window.userDataGlobal = res; // Salva para uso em modais e filtros
          
          const userEmailStr = String(res.userEmail).toLowerCase();
          document.getElementById('currentUserEmail').textContent = userEmailStr;
          document.getElementById('currentUserLevel').textContent = (res.userName || "Usuário") + " - " + res.userLevel;
          setAvatarInitials(userEmailStr);
          
          // 1. Injetar numéricos de Dashboard
          const dPendentes = document.getElementById('dash-pendentes');
          const dEntregues = document.getElementById('dash-entregues');
          const dRisco = document.getElementById('dash-risco');
          
          if(dPendentes) animateCounter(dPendentes, res.dash.pendentes);
          if(dEntregues) animateCounter(dEntregues, res.dash.entregues);
          if(dRisco) animateCounter(dRisco, res.dash.risco);
          
          // 1.1 Injetar Gráficos de Setores e Equipe
          renderizarBarrasPerformance('dash-deptos-box', res.dash.departamentos, 'indigo');
          renderizarBarrasPerformance('dash-users-box', res.dash.usuarios, 'emerald');

          // 2. Injetar layout HTML puro para a Fila de Prioridades
          tarefasGlobaisBase = res.prioridades;
          renderizarTarefas(tarefasGlobaisBase);
          
          // 2. Contador de Revisões (Badge)
          const revCount = tarefasGlobaisBase.filter(t => (t.status || "").toUpperCase() === "REVISAO").length;
          const badgeRev = document.getElementById('badgeRevisoesCount');
          if (badgeRev) {
             if (revCount > 0) {
                badgeRev.textContent = revCount;
                badgeRev.classList.remove('hidden');
             } else {
                badgeRev.classList.add('hidden');
             }
          }
          
          // 2.2 Injetar Revisões se for Admin
          if (res.userLevel === "ADMIN") {
             renderizarRevisoes(tarefasGlobaisBase);
          }
          
          // 3. Popular Metabase CRM
          if (isAutoSync !== true) {
              const cliDemanda = document.getElementById('demandaClienteWeb');
              const cliSol = document.getElementById('solicitarClienteWeb');
              const tipoDem = document.getElementById('demandaTipoWeb');
              
              if(cliDemanda && cliSol) {
                 let htmlCli = '<option value="">-- SELECIONE O CLIENTE --</option>';
                 res.clientes.forEach(c => htmlCli += `<option value="${c}">${c}</option>`);
                 cliDemanda.innerHTML = htmlCli;
                 cliSol.innerHTML = htmlCli;
              }
              if(tipoDem) {
                 let htmlTipo = '<option value="">-- SELECIONE O CLASSIFICADOR --</option>';
                 res.tiposDemanda.forEach(t => htmlTipo += `<option value="${t}">${t}</option>`);
                 htmlTipo += '<option value="OUTROS">CÓDIGO GENÉRICO (OUTROS)</option>';
                 tipoDem.innerHTML = htmlTipo;
              }
          }
          
          // 5. Protocolos agora usam Lazy Loading (carregados sob demanda na aba)
          // NOVO: Forçamos o refresh do Lazy Load em background sempre que recarregarDados ocorrer.
          if (typeof carregarProtocolosServer === "function") {
             carregarProtocolosServer(true, true);
          }
           
           // 5.1. SOLICITAÇÕES: Forçar refresh se já carregou antes
           if (carregouSolicitacoes) {
              if (window.currentView === 'solicitacoes') carregarSolicitacoesServer(true, true);
           }
          
          // 6. Exposição de Super Privilégios (RBAC)
          if (res.userLevel === "ADMIN") {
             const btnAdv = document.getElementById('navAdminWeb');
             if(btnAdv && btnAdv.classList.contains('hidden')) btnAdv.classList.remove('hidden');
             
             const btnRev = document.getElementById('navRevisoes');
             if(btnRev && btnRev.classList.contains('hidden')) btnRev.classList.remove('hidden');
          }
          
          // Oculta a tela de Login caso seja o primeiro acesso bem sucedido
          const loginOverlay = document.getElementById('gisLoginOverlay');
          if (loginOverlay && !loginOverlay.classList.contains('hidden')) {
             loginOverlay.classList.add('opacity-0');
             setTimeout(() => loginOverlay.classList.add('hidden'), 500);
             const fb = document.getElementById('gisFeedback');
             if(fb) fb.classList.add('hidden');
          }
          
          // 🚀 AUTO-START TOUR GUIADO (Apenas na primeira vez)
          if (!localStorage.getItem('jp_tour_done')) {
             const btnTour = document.getElementById('btnTourTutorial');
             if(btnTour) btnTour.classList.add('btn-pulse');

             setTimeout(() => {
                iniciarTourGuiado(true);
             }, 2000);
          }
          
      }).getDadosPortalWeb(window.GIS_TOKEN);
}

function renderizarBarrasPerformance(elementId, dataObj, colorBase) {
    const box = document.getElementById(elementId);
    if (!dataObj || Object.keys(dataObj).length === 0) {
        box.innerHTML = '<div class="text-center text-slate-400 py-6 text-[10px] uppercase font-bold tracking-widest">Sem movimentação registrada no período.</div>';
        return;
    }
    
    // Sort items by absolute volume (total) descending
    const items = Object.entries(dataObj).map(([name, stats]) => ({
       name: name.substring(0, 20),
       ...stats,
       pct: stats.total > 0 ? Math.round((stats.entregues / stats.total) * 100) : 0
    })).sort((a,b) => b.total - a.total);
    
    let html = '<div class="space-y-4">';
    items.forEach(i => {
       const bgTrack = colorBase === 'indigo' ? 'bg-indigo-100' : 'bg-emerald-100';
       const bgFill = colorBase === 'indigo' ? 'bg-indigo-500' : 'bg-emerald-500';
       
       html += `
         <div>
            <div class="flex justify-between text-[10px] font-bold text-slate-600 mb-1 tracking-wider uppercase">
               <span>${i.name}</span>
               <span class="text-slate-500">${i.entregues}/${i.total} <span class="${colorBase==='indigo'?'text-indigo-500':'text-emerald-500'}">(${i.pct}%)</span></span>
            </div>
            <div class="h-2.5 w-full ${bgTrack} rounded-full overflow-hidden">
               <div class="h-full ${bgFill} transition-all duration-1000 ease-out flex items-center justify-end pr-1 text-[8px] text-white font-bold" style="width: ${i.pct}%">${i.pct >= 15 ? i.pct+'%' : ''}</div>
            </div>
         </div>
       `;
    });
    html += '</div>';
    
    box.innerHTML = html;
}

/**
 * Transforma Objeto JSON (Tarefas) em Cards Visuais e injeta no DOM
 */
function renderizarTarefas(tarefas) {
    const box = document.getElementById('containerTarefas');
    if (!box) return;
    
    if (!tarefas || tarefas.length === 0) {
        box.innerHTML = '<div class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full"><i class="fa-solid fa-mug-hot text-5xl mb-4 opacity-50"></i><p>Tudo em dia! Sem pendências.</p></div>';
        return;
    }
    
    // Removemos os flex centrais (loader) caso haja dados:
    box.className = "flex-1 p-6 overflow-y-auto bg-slate-50"; 
    
    let html = '<div class="space-y-3">';
    tarefas.forEach(t => {
        const textoAcao = t.acao || "PROCESSAR";
        const status = (t.status || "").toUpperCase();
        const ehRevisao = status === "REVISAO";
        const ehEnvio = textoAcao.toUpperCase().indexOf('ENVIAR') > -1;
        
        let colorClass = ehEnvio ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-700';
        let borderClass = ehEnvio ? 'border-l-emerald-500' : 'border-l-slate-400 hover:border-l-indigo-500';
        
        if (ehRevisao) {
            colorClass = 'bg-purple-100 text-purple-700';
            borderClass = 'border-l-purple-500 bg-purple-50/30';
        }
        
        // Escape characters para previnir sintaxe error
        const idSafe = String(t.id).replace(/'/g, "\\'");
        const clienteSafe = String(t.cliente).replace(/'/g, "\\'");
        const obriSafe = String(t.obrigacao).replace(/'/g, "\\'");
        
         html += `
          <div onclick="abrirModalTarefa('${idSafe}', '${clienteSafe}', '${obriSafe}', '${t.vencimentoStr}', '${t.acao}', '${status}', '${t.docLinks || ''}', ${t.exigeRevisao || false})" class="task-card flex items-center justify-between p-4 bg-white border border-slate-100 rounded-xl shadow-sm hover:shadow transition group cursor-pointer border-l-4 ${borderClass}">
             <div>
                <div class="flex items-center gap-2 mb-0.5">
                   <span class="bg-slate-800 text-slate-100 px-1.5 py-0.5 rounded text-[9px] font-bold tracking-widest shadow-sm">${t.mesAno}</span>
                   ${ehRevisao ? '<span class="bg-purple-600 text-white px-1.5 py-0.5 rounded text-[8px] font-black tracking-widest shadow-sm animate-pulse">EM REVISÃO</span>' : ''}
                   <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nível ${t.nivel} | Ref: ${t.id}</p>
                </div>
                <p class="text-xs font-bold text-jp-navy uppercase tracking-wider">${t.cliente}</p>
                <div class="flex items-center gap-2">
                   <p class="text-sm text-slate-600 font-medium">${t.obrigacao}</p>
                   <span class="text-[9px] font-bold text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-100 uppercase">${t.depto}</span>
                </div>
                ${t.responsavel ? `<p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1"><i class="fa-solid fa-user-tag mr-1 text-slate-300"></i>${t.responsavel}</p>` : ''}
             </div>
             <div class="text-right flex flex-col items-end">
                <p class="text-[11px] font-bold ${ehRevisao ? 'text-purple-600' : 'text-red-500'} mb-2"><i class="fa-regular fa-clock mr-1"></i> ${t.vencimentoStr}</p>
                <span class="text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded ${colorClass}">${ehRevisao ? 'VALIDAR ENTREGA' : textoAcao}</span>
             </div>
          </div>
        `;
    });
    html += '</div>';
    
    box.innerHTML = html;
}

/**
 * Filtra e renderiza apenas tarefas com status REVISÃO para o Admin
 */
function renderizarRevisoes(tarefas) {
    const box = document.getElementById('listaRevisoesDinamica');
    if (!box) return;
    
    const revisoes = tarefas.filter(t => (t.status || "").toUpperCase() === "REVISAO");
    
    if (revisoes.length === 0) {
        box.innerHTML = '<div class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full"><i class="fa-solid fa-stamp text-5xl mb-4 opacity-50"></i><p>Nenhuma tarefa aguardando validação.</p></div>';
        return;
    }
    
    let html = '<div class="space-y-3">';
    revisoes.forEach(t => {
        const idSafe = String(t.id).replace(/'/g, "\\'");
        const clienteSafe = String(t.cliente).replace(/'/g, "\\'");
        const obriSafe = String(t.obrigacao).replace(/'/g, "\\'");
        
        html += `
          <div onclick="abrirModalTarefa('${idSafe}', '${clienteSafe}', '${obriSafe}', '${t.vencimentoStr}', '${t.acao}', 'REVISAO', '${t.docLinks || ''}')" class="task-card flex items-center justify-between p-4 bg-white border border-purple-100 rounded-xl shadow-sm hover:shadow transition group cursor-pointer border-l-4 border-l-purple-500 bg-purple-50/20">
             <div>
                <div class="flex items-center gap-2 mb-0.5">
                   <span class="bg-purple-600 text-white px-1.5 py-0.5 rounded text-[8px] font-black tracking-widest shadow-sm animate-pulse">REVISÃO PENDENTE</span>
                   <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ref: ${t.id}</p>
                </div>
                <p class="text-xs font-bold text-jp-navy uppercase tracking-wider">${t.cliente}</p>
                <div class="flex items-center gap-2">
                   <p class="text-sm text-slate-600 font-medium">${t.obrigacao}</p>
                   <span class="text-[9px] font-bold text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-100 uppercase">${t.depto}</span>
                </div>
             </div>
             <div class="text-right flex flex-col items-end">
                <p class="text-[11px] font-bold text-purple-600 mb-2"><i class="fa-regular fa-clock mr-1"></i> ${t.vencimentoStr}</p>
                <span class="text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-purple-100 text-purple-700 border border-purple-200 shadow-sm">VALIDAR AGORA</span>
             </div>
          </div>
        `;
    });
    html += '</div>';
    box.innerHTML = html;
}

function filtrarTarefasWeb() {
   const q = document.getElementById('inputBuscaTarefas').value.toLowerCase().trim();
   if(!q) { renderizarTarefas(tarefasGlobaisBase); return; }
   
   const fList = tarefasGlobaisBase.filter(t => 
      t.cliente.toLowerCase().includes(q) || 
      t.obrigacao.toLowerCase().includes(q) ||
      String(t.id).toLowerCase().includes(q)
   );
   renderizarTarefas(fList);
}

// ================= LÓGICA DO MOTOR DE AÇÃO (MODAL DE RESOLUÇÃO) =================
let tarefaEmFoco = null;
let arquivosStagedWeb = [];
let precisaUploadWeb = false;

function abrirModalTarefa(id, cliente, obrigacao, vencimento, acaoRaw, status, docLinks, exigeRevisao) {
    tarefaEmFoco = { id, cliente, obrigacao, vencimento, acao: acaoRaw, status: status, exigeRevisao: exigeRevisao };
    
    document.getElementById('modalCliente').textContent = cliente;
    document.getElementById('modalObrigacao').textContent = obrigacao;
    document.getElementById('modalVcto').textContent = vencimento;
    
    const acao = String(acaoRaw || "").toUpperCase().trim();
    const ehRevisao = (status || "").toUpperCase() === "REVISAO";
    const ehEnvio = acao.indexOf("ENVIAR") > -1;
    const ehAuditoria = acao.indexOf("AUDITAR") > -1;
    const ehComunicar = acao.indexOf("COMUNICAR") > -1;
    const isAdmin = window.userDataGlobal && (["ADMIN", "MASTER", "CONSULTOR"].indexOf(window.userDataGlobal.userLevel) > -1);
    
    let colorClass = "text-slate-600 border-slate-200 bg-slate-100";
    if(ehEnvio) colorClass = "text-emerald-700 border-emerald-200 bg-emerald-50";
    if(ehAuditoria) colorClass = "text-amber-700 border-amber-200 bg-amber-50";
    if(ehComunicar) colorClass = "text-white border-indigo-500 bg-indigo-600 shadow-md";
    if(ehRevisao) colorClass = "text-purple-700 border-purple-200 bg-purple-50 shadow-sm";
    
    const badge = document.getElementById('modalAcaoBadge');
    badge.className = `inline-flex text-[11px] font-bold uppercase tracking-wider px-3 py-1.5 rounded border ${colorClass}`;
    badge.textContent = ehRevisao ? `AGUARDANDO VALIDAÇÃO SÊNIOR` : `AÇÃO EXIGIDA: ${acao}`;
    
    const linksContainer = document.getElementById('areaDocumentosRevisaoWeb');
    if (linksContainer) {
       linksContainer.innerHTML = '';
       if (ehRevisao && docLinks) {
          const links = docLinks.split('|');
          let htmlLinks = '<p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Documentos em Análise</p><div class="flex flex-col gap-2">';
          links.forEach((l, i) => {
             const url = l.trim();
             if (url) htmlLinks += `<a href="${url}" target="_blank" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 px-3 py-2 rounded-lg flex items-center shadow-sm w-full transition"><i class="fa-solid fa-file-contract mr-2"></i> ${links.length === 1 ? 'Acessar Documento Único' : 'Acessar Documento ' + (i+1)}</a>`;
          });
          htmlLinks += '</div>';
          linksContainer.innerHTML = htmlLinks;
          linksContainer.style.display = 'block';
       } else {
          linksContainer.style.display = 'none';
       }
    }
    
    precisaUploadWeb = (ehEnvio || ehAuditoria || exigeRevisao) && !ehRevisao;
    document.getElementById('areaUpload').style.display = precisaUploadWeb ? 'block' : 'none';
    
    const areaCom = document.getElementById('areaComunicacaoWeb');
    if (areaCom) areaCom.style.display = (ehComunicar && !ehRevisao) ? 'block' : 'none';
    
    const txtCom = document.getElementById('textoComunicarWeb');
    if (txtCom) txtCom.value = '';
    
    // Reset modal state
    arquivosStagedWeb = [];
    document.getElementById('fileInputObj').value = "";
    document.getElementById('fileListDisplayWeb').innerHTML = "";
    document.getElementById('modalFeedback').className = "hidden";
    
    const btnFin = document.getElementById('btnFinalizarWeb');
    
    if (ehRevisao) {
       if (isAdmin) {
          btnFin.disabled = false;
          btnFin.innerHTML = `<i class="fa-solid fa-stamp mr-2"></i> Validar e Encerrar Agora`;
          btnFin.className = "px-6 py-2 text-sm font-black bg-purple-600 hover:bg-purple-700 text-white rounded shadow-lg transition flex items-center uppercase tracking-widest";
          btnFin.onclick = aprovarTarefaWeb;
       } else {
          btnFin.disabled = true;
          btnFin.innerHTML = `<i class="fa-solid fa-hourglass-half mr-2"></i> Em Revisão pelo Gerente`;
          btnFin.className = "px-6 py-2 text-sm font-bold bg-slate-200 text-slate-400 rounded cursor-not-allowed flex items-center";
          btnFin.onclick = null;

async function adicionarArquivosWeb() {
    const input = document.getElementById('fileInputObj');
    const fs = input.files;
    if (!fs || fs.length === 0) return;
    
    const feedback = document.getElementById('modalFeedback');
    feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-indigo-50 border-indigo-100 text-indigo-700 block";
    feedback.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Convertendo e preparando arquivos...`;
    
    try {
      const promessasLeitura = Array.from(fs).map(file => {
        return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = (e) => resolve({ name: file.name, base64: e.target.result.split(',')[1] });
          r.onerror = () => reject(new Error("Falha ao ler " + file.name));
          r.readAsDataURL(file);
        });
      });

      const novosArquivos = await Promise.all(promessasLeitura);
      arquivosStagedWeb = arquivosStagedWeb.concat(novosArquivos);
      renderizarListaArquivosWeb(); 
      feedback.className = "hidden";
    } catch (e) {
      feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-red-50 border-red-100 text-red-600 block";
      feedback.textContent = e.message;
    } finally {
      input.value = ""; 
    }
}

function removerArquivoWeb(index) {
    arquivosStagedWeb.splice(index, 1);
    renderizarListaArquivosWeb();
}

function renderizarListaArquivosWeb() {
    const box = document.getElementById('fileListDisplayWeb');
    if(arquivosStagedWeb.length === 0) {
        box.innerHTML = ''; return;
    }
    let html = '';
    arquivosStagedWeb.forEach((f, i) => {
        html += `
          <div class="flex justify-between items-center bg-white border border-slate-200 px-3 py-2 rounded shadow-sm">
             <span class="text-xs font-medium text-slate-600 truncate mr-2"><i class="fa-regular fa-file-pdf mr-2 text-indigo-400"></i>${f.name}</span>
             <button onclick="removerArquivoWeb(${i})" class="text-red-400 hover:text-red-500 p-1"><i class="fa-solid fa-trash-can"></i></button>
          </div>
        `;
    });
    box.innerHTML = html;
}

/**
 * Exibe um alerta de confirmação personalizado com design premium e retorna uma Promise.
 */
function confirmarCustom(mensagem) {
    return new Promise((resolve) => {
        const modal = document.getElementById('modalConfirm');
        const content = document.getElementById('modalConfirmContent');
        const txt = document.getElementById('modalConfirmTexto');
        const btnSim = document.getElementById('btnConfirmSim');
        const btnNao = document.getElementById('btnConfirmCancelar');
        
        txt.textContent = mensagem;
        
        const fechar = (reposta) => {
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                resolve(reposta);
            }, 300);
        };
        
        btnSim.onclick = () => fechar(true);
        btnNao.onclick = () => fechar(false);
        
        // Exibe o modal
        modal.classList.remove('hidden');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-90');
        }, 10);
    });
}

async function finalizarProcessoWeb() {
    if(!tarefaEmFoco) return;
    const feedback = document.getElementById('modalFeedback');
    
    const textoComunicar = document.getElementById('textoComunicarWeb') ? document.getElementById('textoComunicarWeb').value.trim() : "";
    const acaoAtual = String(tarefaEmFoco.acao || "").toUpperCase().trim();

    if (acaoAtual.indexOf("COMUNICAR") > -1 && !textoComunicar) {
      feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-orange-50 border-orange-200 text-orange-700 block";
      feedback.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> Escreva a mensagem do comunicado antes de avançar.`;
      return;
    }

    if (precisaUploadWeb && arquivosStagedWeb.length === 0) {
      feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-orange-50 border-orange-200 text-orange-700 block";
      feedback.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> Anexe os documentos mandatórios para avançar.`;
      return;
    }
    
    const btnFin = document.getElementById('btnFinalizarWeb');
    btnFin.disabled = true;
    btnFin.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Enviando e Fechando...`;
    btnFin.className = "px-6 py-2 text-sm font-bold bg-slate-400 text-white rounded shadow flex items-center cursor-not-allowed";
    
    feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-indigo-50 border-indigo-200 text-indigo-700 block";
    feedback.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-2 text-indigo-500 text-lg align-middle"></i> Acessando nuvem (Motor REST via Planilha)...`;

    google.script.run
      .withFailureHandler(err => {
         feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-red-50 border-red-200 text-red-700 block";
         feedback.textContent = "Falha de Google Script Runtime: " + err.message;
         btnFin.disabled = false;
         btnFin.innerHTML = `<i class="fa-solid fa-check mr-2"></i> Confirmar Fechamento`;
         btnFin.className = "px-6 py-2 text-sm font-bold bg-jp-navy hover:bg-indigo-700 text-white rounded shadow transition flex items-center";
      })
      .withSuccessHandler(async urlWebApp => {
         let forcarUpload = false;
         let sucessoFinal = false;
         
         while (!sucessoFinal) {
           try {
             feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-indigo-50 border-indigo-200 text-indigo-700 block";
             feedback.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-2 text-indigo-500 text-lg align-middle"></i> ${forcarUpload ? 'Forçando Upload...' : 'Acessando nuvem (Motor REST)...'}`;

             const payload = {
               action: "uploadBatch",
               token: window.GIS_TOKEN,
               arquivos: arquivosStagedWeb,
               mensagem: acaoAtual.indexOf("COMUNICAR") > -1 ? textoComunicar : "",
               taskId: tarefaEmFoco.id,
               clienteNome: tarefaEmFoco.cliente,
               forcar: forcarUpload
             };
             
             const resposta = await fetch(urlWebApp, {
               method: 'POST',
               body: JSON.stringify(payload),
               headers: { 'Content-Type': 'text/plain;charset=utf-8' }
             });
             
             const result = await resposta.json();
             
             if (result.success) {
               feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-emerald-50 border-emerald-200 text-emerald-700 block";
               feedback.innerHTML = `<i class="fa-solid fa-check-circle mr-2 text-emerald-500"></i> Sucesso! Tarefa concluída e rotinas acionadas.`;
               
               if (result.dispararEmailVIP) {
                 google.script.run.processarAuditoriaRelatorioBackground(result.backgroundPayload);
               }
               
               carregarDadosBase(); // Refresh data quietly
               setTimeout(() => { fecharModalTarefa(); }, 2000);
               sucessoFinal = true;
               
             } else if (result.needsConfirmation) {
                // ⚠️ Alerta de OCR / CNPJ Divergente (AGORA PERSONALIZADO)
                const prosseguir = await confirmarCustom(result.message);
                
                if (prosseguir) {
                   forcarUpload = true; // Usuário confirmou, tenta de novo forçando
                } else {
                   // Usuário cancelou
                   btnFin.disabled = false;
                   btnFin.innerHTML = `<i class="fa-solid fa-check mr-2"></i> Confirmar Fechamento`;
                   btnFin.className = "px-6 py-2 text-sm font-bold bg-jp-navy hover:bg-indigo-700 text-white rounded shadow transition flex items-center";
                   feedback.className = "hidden";
                   return;
                }
             } else {
               throw new Error(result.error || result.message);
             }
           } catch (errFetch) {
              feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-red-50 border-red-200 text-red-700 block";
              feedback.innerHTML = `<i class="fa-solid fa-xmark mr-2 text-red-500"></i> <b>Erro:</b> ${errFetch.message}`;
              btnFin.disabled = false;
              btnFin.innerHTML = `<i class="fa-solid fa-rotate-right mr-2"></i> Tentar Novamente`;
              btnFin.className = "px-6 py-2 text-sm font-bold bg-orange-500 hover:bg-orange-600 text-white rounded shadow transition flex items-center";
              return;
           }
         }
      }).getUrlParaFetch();
}

/**
 * Função responsável por navegar (ocultar barras e exibir seções selecionadas)
 * @param {string} pageId - ID do contexto a ser exibido ('dashboard', 'tarefas'...)
 */
function navigate(pageId) {
    console.log("Navegando para rota interna: " + pageId);
    window.currentView = pageId;

    
    // 1. Tratamento Visual dos Botões na Sidebar
    const navButtons = document.querySelectorAll('.nav-btn');
    navButtons.forEach(btn => {
        // Remove active state
        btn.classList.remove('active');
        btn.classList.add('opacity-70', 'hover:bg-slate-800');
        
        // Add active se for o clicado
        if (btn.getAttribute('onclick').includes(pageId)) {
            btn.classList.add('active');
            btn.classList.remove('opacity-70', 'hover:bg-slate-800');
        }
    });

    // 2. Ocultar todas as seções `<section>`
    const sections = document.querySelectorAll('.view-section');
    sections.forEach(sec => {
        sec.classList.remove('active');
        sec.classList.add('hidden');
    });

    // 3. Exibir apenas a seção alvo
    const targetSection = document.getElementById('view-' + pageId);
    if (targetSection) {
        targetSection.classList.remove('hidden');
        targetSection.classList.add('active', 'fade-in'); // refaz a anim
    }
    
    // 4. Mudar Título do Topbar baseando-se no ID (Quick Transform)
    const titles = {
        'dashboard': 'Visão Geral (Dashboard)',
        'tarefas': 'Tarefas e Prioridades',
        'risco': 'Painel de Risco (Compliance)',
        'historico': 'Arquivo Morto e Auditoria',
        'protocolos': 'Gestão de Protocolos',
        'acessos': 'Gestão de Equipe e Atividade',
        'solicitacoes': 'Painel de Solicitações',
        'revisoes': 'Validação Sênior (Fila de Revisão)',
        'comunicacao': 'Comunicação Oficial e Relacionamento Interno',
        'admin': 'Robótica e Administração Geral'
    };
    document.getElementById('pageTitle').textContent = titles[pageId] || "Portal";
    
    // Gatilho Lazy Load
    if (pageId === 'risco' && !carregouRisco) { carregarRiscoServer(); }
    if (pageId === 'historico' && !carregouHistorico) { carregarHistoricoServer(); }
    if (pageId === 'protocolos' && !carregouProtocolos) { carregarProtocolosServer(); }
    if (pageId === 'solicitacoes' && !carregouSolicitacoes) { carregarSolicitacoesServer(); }
    if (pageId === 'acessos' && !carregouAcessos) { carregarAcessosServer(); }
    if (pageId === 'admin' && !carregouLogs) { carregarLogsServer(); }
}

function carregarProtocolosServer(forcarRefresh, isQuiet) {
   if (forcarRefresh) carregouProtocolos = false;
   
   const containerP = document.getElementById('containerProtocolosPendentes');
   const containerT = document.getElementById('containerProtocolosTodos');

   if (!isQuiet || (containerP && containerP.innerHTML.trim() === '')) {
      if(containerP) containerP.innerHTML = '<div class="p-4 flex items-center text-slate-400 text-[10px] uppercase font-bold tracking-widest"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Atualizando pendências...</div>';
      if(containerT) containerT.innerHTML = '<div class="p-10 flex flex-col items-center justify-center text-slate-400 h-full"><i class="fa-solid fa-file-signature text-4xl mb-4 text-indigo-300 fa-fade"></i><p class="text-[10px] uppercase tracking-widest font-bold">Consolidando histórico completo...</p></div>';
   }

   google.script.run
     .withFailureHandler(err => { 
        if(containerP) containerP.innerHTML = `<div class="p-4 text-red-500 font-bold text-[10px]">Erro: ${err.message}</div>`; 
     })
     .withSuccessHandler(res => {
        if (!res.success) { 
           if(containerP) containerP.innerHTML = `<div class="p-4 text-red-500 font-bold text-[10px]">${res.error}</div>`; 
           return; 
        }
        carregouProtocolos = true;
        
        // Atualiza o badge na sidebar
        const badge = document.getElementById('badgeProtocolosCount');
        if (badge) {
           if (res.pendentes && res.pendentes.length > 0) {
              badge.textContent = res.pendentes.length;
              badge.classList.remove('hidden');
           } else {
              badge.classList.add('hidden');
           }
        }

        const bPend = document.getElementById('badgeProtocolosPendentes');
        if(bPend) bPend.textContent = res.pendentes ? res.pendentes.length : 0;
        
        protocolosGlobalBase = res.todos || [];

function filtrarProtocolosHistorico() {

function initTelemetria() {
   console.log("📡 Iniciando Telemetria de Acesso...");
   
   // Função de envio resiliente
   const enviarSinal = (tipo) => {
      google.script.run
         .withFailureHandler(err => console.error(`❌ Erro Telemetria (${tipo}):`, err))
         .withSuccessHandler(() => console.log(`✅ Sinal de atividade enviado: ${tipo}`))
         .registrarAtividadePortal(window.GIS_TOKEN, tipo);
   };

   // Registro inicial de entrada
   enviarSinal("ENTRADA");
   
   // Sincronização inicial da badge de usuários online
   carregarAcessosServer(false, true);
   
   // Loop de Heartbeat a cada 5 minutos
   setInterval(() => {
      enviarSinal("HEARTBEAT");
      
      // Atualização automática do Painel e da Badge na Sidebar (Background)
      carregarAcessosServer(false, true);
   }, 300000);
}

let filtroAcessosAtivo = 'hoje';

function toggleFiltroAcesso(periodo) {
   filtroAcessosAtivo = periodo;
   
   // UI Toggle
   const btnHoje = document.getElementById('tabAcessoHoje');
   const btnMensal = document.getElementById('tabAcessoMensal');
   
   if (periodo === 'hoje') {
      btnHoje.className = "px-3 py-1 text-[9px] font-black uppercase rounded-md transition-all bg-white shadow-sm text-jp-navy";
      btnMensal.className = "px-3 py-1 text-[9px] font-black uppercase rounded-md transition-all text-slate-500 hover:bg-white/50";
      document.getElementById('kpiAtivosLabel').textContent = "Ativos (Hoje)";
      document.getElementById('kpiAtivosDesc').textContent = "Total de usuários no dia";

   } else {

      btnHoje.className = "px-3 py-1 text-[9px] font-black uppercase rounded-md transition-all text-slate-500 hover:bg-white/50";

function carregarAcessosServer(forcarRefresh, isQuiet) {
   if (filtroAcessosAtivo === 'mensal') { carregarAcessosMensais(forcarRefresh); return; }
   if (forcarRefresh) carregouAcessos = false;
   
   const container = document.getElementById('containerAcessos');
   if (!isQuiet || container.innerHTML.trim() === '') {
      container.innerHTML = '<div class="p-10 flex flex-col items-center justify-center text-slate-400 h-full"><i class="fa-solid fa-satellite-dish text-4xl mb-4 text-indigo-300 fa-fade"></i><p class="text-[10px] uppercase tracking-widest font-bold">Processando telemetria da equipe...</p></div>';
   }

   google.script.run
     .withFailureHandler(err => { 
        if(container) container.innerHTML = `<div class="p-4 text-red-500 font-bold text-[10px]">Erro: ${err.message}</div>`; 
     })
     .withSuccessHandler(res => {
        if (!res.success) { return; }
        carregouAcessos = true;
        
        // Atualiza KPIs
        document.getElementById('kpiOnlineAgora').textContent = res.stats.online;
        document.getElementById('kpiTotalAtivos').textContent = res.stats.totalAtivos;
        
        // Atualiza Badge Online na Sidebar
        const bOnline = document.getElementById('badgeOnlineCount');
        if (bOnline) {
           bOnline.textContent = res.stats.online;
           bOnline.classList.toggle('hidden', res.stats.online === 0);
        }

        renderizarTabelaEquipe(res.usuarios || []);
     }).getRelatorioEquipe();
}

function carregarAcessosMensais(forcarRefresh) {
   const container = document.getElementById('containerAcessos');
   container.innerHTML = '<div class="p-10 flex flex-col items-center justify-center text-slate-400 h-full"><i class="fa-solid fa-calendar-check text-4xl mb-4 text-indigo-300 fa-fade"></i><p class="text-[10px] uppercase tracking-widest font-bold">Consolidando métricas mensais...</p></div>';

   google.script.run
     .withFailureHandler(err => { 
        container.innerHTML = `<div class="p-4 text-red-500 font-bold text-[10px]">Erro: ${err.message}</div>`; 
     })
     .withSuccessHandler(res => {
        if (!res.success) return;
        
        // Atualiza KPI consolidado para o mês
        document.getElementById('kpiTotalAtivos').textContent = res.usuarios.length;
        renderizarTabelaMensal(res.usuarios || [], res.mesFmt);

function acionarRoboAdmin(nomeFuncao, idBotao) {
   const btn = document.getElementById(idBotao);
   const fb = document.getElementById('adminFeedbackWeb');
   const oldHtml = btn.innerHTML;
   const oldClass = btn.className;
   
   btn.disabled = true; 
   btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Robô Online...';
   btn.className = "w-full bg-slate-300 border border-slate-300 text-slate-500 font-bold py-2.5 rounded text-[10px] uppercase cursor-not-allowed transition mb-0";
   
   fb.classList.remove('hidden');
   const time = new Date().toLocaleTimeString();
   fb.innerHTML = `> [${time}] Iniciando protocolo remoto: <b class="text-white">${nomeFuncao}()</b>... <i class="fa-solid fa-spinner fa-spin ml-2"></i>`;
   
   google.script.run
     .withFailureHandler(err => {
        btn.disabled = false; btn.innerHTML = oldHtml; btn.className = oldClass;
        fb.innerHTML += `<br>> <span class="text-red-400 font-bold">[FALHA CRÍTICA DO GOOGLE] ${err.message}</span>`;
     })
     .withSuccessHandler(res => {
        btn.disabled = false; btn.innerHTML = oldHtml; btn.className = oldClass;
        fb.innerHTML += `<br>> <span class="text-emerald-400 font-bold">[SUCESSO MESTRE] ${res || "Tarefa administrativa finalizada. Logs aplicados."}</span>`;
        if (nomeFuncao === 'comandoAtualizarRisco' || nomeFuncao === 'comandoArquivarTarefas') {
            carregouRisco = false; // Destroy Cache view
            carregouHistorico = false;
            carregouProtocolos = false;
             carregouSolicitacoes = false;
        }
     })
     [nomeFuncao](); // Invoca qualquer função remota global dinamicamente via Prototype
}

   const container = document.getElementById('containerLogs');
   if (!lista || lista.length === 0) {
      container.innerHTML = '<div class="p-10 h-full flex flex-col justify-center items-center text-slate-400"><i class="fa-solid fa-wind text-5xl mb-4 opacity-30"></i><p class="text-xs uppercase font-bold tracking-widest">Nenhum registro encontrado.</p></div>';
      return;

// ================= SOLICITAÇÕES (LAZY LOADING) =================

function carregarSolicitacoesServer(forcarRefresh, isQuiet) {
   if (forcarRefresh) carregouSolicitacoes = false;

   const container = document.getElementById('containerSolicitacoes');
   if (!isQuiet || container.innerHTML.trim() === '') {
      container.innerHTML = '<div class="p-10 flex flex-col items-center justify-center text-slate-400 h-full"><i class="fa-solid fa-clipboard-list text-4xl mb-4 text-teal-300 fa-fade"></i><p class="text-[10px] uppercase tracking-widest font-bold">Consolidando solicitações...</p></div>';
   }

   google.script.run
     .withFailureHandler(err => { container.innerHTML = `<div class="p-6 text-red-500 font-bold text-[11px] text-center border-t border-red-100">Erro: ${err.message}</div>`; })
     .withSuccessHandler(res => {
        if (!res.success) { container.innerHTML = `<div class="p-6 text-red-500 font-bold text-[11px] text-center border-t border-red-100">${res.error}</div>`; return; }
        carregouSolicitacoes = true;
        solicitacoesGlobalBase = res.data;
        renderizarSolicitacoes(solicitacoesGlobalBase);
     }).getDadosSolicitacoesTabWeb(window.GIS_TOKEN);
}

function renderizarSolicitacoes(lista) {
   const container = document.getElementById('containerSolicitacoes');
   if (!lista || lista.length === 0) {
      container.innerHTML = '<div class="p-10 h-full flex flex-col justify-center items-center text-slate-400"><i class="fa-solid fa-clipboard-check text-5xl mb-4 opacity-30 text-teal-500"></i><h2 class="text-lg font-bold text-teal-600 mb-1">Nenhuma Solicitação</h2><p class="text-xs uppercase font-bold tracking-widest">Tudo resolvido por aqui.</p></div>';
      return;
   }

   container.className = "flex-1 p-6 overflow-y-auto bg-slate-50";
   let html = '<div class="space-y-4">';

   lista.forEach(item => {
      const isPendente = item.status === "PENDENTE";
      const statusBadge = isPendente 
        ? 'bg-amber-100 text-amber-700 border border-amber-200'
        : 'bg-emerald-100 text-emerald-700 border border-emerald-200';
      const statusIcon = isPendente ? 'fa-hourglass-half' : 'fa-check-circle';

      const metaDisplay = item.metaTarefa || (item.idTarefa !== 'AVULSA' ? item.idTarefa : 'Avulsa');
      
      const isAdmin = window.userDataGlobal && (["ADMIN", "MASTER", "CONSULTOR"].indexOf(window.userDataGlobal.userLevel) > -1);
      const rowId = String(item.id).replace(/'/g, "\'");
      
      let btnAcao = '';
      if (isPendente && isAdmin) {
        btnAcao = `<button onclick="cobrarSolicitacao('${rowId}', this)" title="Reenviar Cobrança" class="bg-amber-500 hover:bg-amber-600 text-white text-[9px] font-bold px-3 py-1.5 rounded-lg shadow-sm transition"><i class="fa-solid fa-paper-plane mr-1.5"></i>Cobrar Agora</button>`;
      } else if (!isPendente && item.linkArquivo) {
        if (item.linkArquivo.startsWith("RESPOSTA:")) {
           const safePayload = item.linkArquivo.replace(/'/g, "&apos;").replace(/"/g, "&quot;").replace(/\\n/g, "\\\\n").replace(/\\r/g, "");
           btnAcao = `<button onclick="abrirConteudoResposta('${safePayload}')" class="bg-teal-600 hover:bg-teal-700 text-white text-[9px] font-bold px-3 py-1.5 rounded-lg shadow-sm transition inline-flex items-center"><i class="fa-solid fa-eye mr-1.5"></i>Acessar Retorno</button>`;
        } else {
           btnAcao = `<a href="${item.linkArquivo}" target="_blank" class="bg-teal-600 hover:bg-teal-700 text-white text-[9px] font-bold px-3 py-1.5 rounded-lg shadow-sm transition inline-flex items-center"><i class="fa-solid fa-folder-open mr-1.5"></i>Ver Docs</a>`;
        }
      } else {
        btnAcao = `<span class="text-slate-400 text-[9px] font-bold italic"><i class="fa-solid ${isPendente ? 'fa-hourglass' : 'fa-check-double'} mr-1"></i>${isPendente ? 'Aguardando Cliente' : 'Finalizado'}</span>`;
      }

      html += `
         <div class="task-card p-5 bg-white border border-slate-100 rounded-xl shadow-sm hover:shadow-md transition border-l-4 ${isPendente ? 'border-l-amber-400' : 'border-l-teal-500'}">
            <div class="flex justify-between items-start mb-3">
               <div class="flex items-center gap-2">
                  <span class="bg-slate-100 text-slate-500 px-2 py-0.5 rounded text-[8px] font-bold tracking-widest uppercase border border-slate-200"><i class="fa-regular fa-calendar mr-1"></i>${item.data}</span>
                  <span class="${statusBadge} px-2 py-0.5 rounded text-[8px] font-bold tracking-widest uppercase"><i class="fa-solid ${statusIcon} mr-1"></i>${item.status}</span>
               </div>
               <div class="text-right">
                  <span class="text-[8px] font-black text-slate-300 tracking-tighter uppercase mr-1">Avisos:</span>
                  <span class="bg-slate-50 text-slate-500 px-1.5 py-0.5 rounded text-[9px] font-bold border border-slate-100">${item.qtdAvisos}</span>
               </div>
            </div>
            
            <div class="mb-4">
               <div class="text-[10px] font-bold text-jp-navy uppercase tracking-wider mb-1">${item.cliente}</div>
               <div class="text-xs text-slate-600 font-medium leading-relaxed bg-slate-50/50 p-3 rounded-lg border border-dashed border-slate-200">${item.pedido}</div>
            </div>

            <div class="flex items-center justify-between pt-3 border-t border-slate-100">
               <div class="flex items-center gap-3">
                  <div class="flex flex-col">
                     <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Responsável</span>
                     <span class="text-[10px] font-bold text-slate-600 uppercase">${item.responsavel}</span>
                  </div>
                  <div class="h-6 border-l border-slate-200 mx-1"></div>
                  <div class="flex flex-col">
                     <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Vinculada à</span>
                     <span class="text-[10px] font-bold text-teal-600 uppercase truncate max-w-[150px]">${metaDisplay}</span>
                  </div>
               </div>
               <div class="flex gap-2">
                  ${btnAcao}
               </div>
            </div>
         </div>
      `;
   });
   html += '</div>';
   container.innerHTML = html;
}

function filtrarSolicitacoesWeb() {
   if (!carregouSolicitacoes) return;
   const q = document.getElementById('inputBuscaSolicitacoes').value.toLowerCase().trim();
   if (!q) { renderizarSolicitacoes(solicitacoesGlobalBase); return; }

   const fList = solicitacoesGlobalBase.filter(i =>
      i.cliente.toLowerCase().includes(q) ||
      i.pedido.toLowerCase().includes(q) ||
      i.id.toLowerCase().includes(q) ||
      i.responsavel.toLowerCase().includes(q)
   );
   renderizarSolicitacoes(fList);
}

function cobrarSolicitacao(solId, btnEl) {
   if (!solId || !btnEl) return;
   
   const oldHtml = btnEl.innerHTML;
   btnEl.disabled = true;
   btnEl.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
   btnEl.classList.add('opacity-50');

   google.script.run
     .withFailureHandler(err => {
        btnEl.disabled = false;
        btnEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
        btnEl.classList.remove('opacity-50', 'bg-amber-500');
        btnEl.classList.add('bg-red-500');
        console.error(err);
        setTimeout(() => { 
           btnEl.innerHTML = oldHtml;
           btnEl.classList.remove('bg-red-500');
           btnEl.classList.add('bg-amber-500');
        }, 3000);
     })
     .withSuccessHandler(res => {
        if (!res.success) {
           btnEl.disabled = false;
           btnEl.innerHTML = '<i class="fa-solid fa-xmark"></i>';
           btnEl.classList.remove('opacity-50', 'bg-amber-500');
           btnEl.classList.add('bg-orange-500');
           setTimeout(() => { 
              btnEl.innerHTML = oldHtml;
              btnEl.classList.remove('bg-orange-500');
              btnEl.classList.add('bg-amber-500');
           }, 3000);
           return;
        }
        
        btnEl.innerHTML = '<i class="fa-solid fa-check"></i>';
        btnEl.classList.remove('opacity-50', 'bg-amber-500');
        btnEl.classList.add('bg-emerald-500');
        
        // Recarrega silenciosamente em 2 segundos
        setTimeout(() => { carregarSolicitacoesServer(); }, 2000);
     }).cobrarSolicitacaoUnica(window.GIS_TOKEN, solId);
}
function abrirConteudoResposta(payload) {
    let texto = payload;
    let arquivos = "";
    
    if (payload.indexOf(" | ARQUIVOS: ") > -1) {
        const parts = payload.split(" | ARQUIVOS: ");
        texto = parts[0];
        arquivos = parts[1];
    }
    
    if (texto.startsWith("RESPOSTA:")) {
        texto = texto.substring(9).trim();
    }
    
    document.getElementById('textoVisualizarResposta').textContent = texto;
    
    const boxArquivos = document.getElementById('boxArquivosResposta');
    const linkArquivos = document.getElementById('linkArquivosResposta');
    
    if (arquivos && arquivos.trim().length > 0) {
        linkArquivos.href = arquivos.trim();
        boxArquivos.classList.remove('hidden');
    } else {
        boxArquivos.classList.add('hidden');
    }
    
    const modal = document.getElementById('modalVisualizarResposta');
    const content = document.getElementById('modalVisualizarRespostaContent');
    modal.classList.remove('hidden');
    
    setTimeout(() => { 
        modal.classList.remove('opacity-0'); 
        content.classList.remove('scale-95');
    }, 10);
}

function fecharModalVisualizarResposta() {
    const modal = document.getElementById('modalVisualizarResposta');
    const content = document.getElementById('modalVisualizarRespostaContent');
    
    modal.classList.add('opacity-0');
    content.classList.add('scale-95');
    
    setTimeout(() => {
        modal.classList.add('hidden');
    }, 300);
}

function iniciarTourGuiado(isAuto) {

    const tour = introJs();

    tour.setOptions({
        steps: [
            {
                title: 'Bem-vindo! 🚀',
                intro: 'Este é o <b>Portal Janio Pontes SaaS</b>. Vamos te mostrar como dominar todas as ferramentas essenciais na ordem correta.',

            },

                position: 'right'
            },
            {
                element: '#containerDashboard',
                title: '1. Dashboard',
                intro: 'O coração do portal. Acompanhe KPIs de produtividade e o status das entregas legais em tempo real.',
                view: 'dashboard'
            },
            {
                element: '#containerTarefas',
                title: '2. Tarefas e Prioridades',
                intro: 'Este é o seu quadro operacional. Aqui você valida documentos e acompanha a esteira de produção.',
                view: 'tarefas'
            },
            {
                element: '#containerRisco',
                title: '3. Compliance (Risco)',
                intro: 'Monitore riscos críticos e prazos fatais. A IA ajuda a evitar multas e inconsistências fiscais.',
                view: 'risco'
            },
            {
                element: '#containerHistorico',
                title: '4. Histórico',
                intro: 'Tudo o que já foi entregue e resolvido fica guardado aqui para consultas rápidas e auditorias.',
                view: 'historico'
            },
            {
                element: '#containerProtocolos',
                title: '5. Protocolos',
                intro: 'Confira documentos que acabaram de chegar via OCR ou integração. Leia e valide protocolos pendentes.',
                view: 'protocolos'
            },
            {
                element: '#containerSolicitacoes',
                title: '6. Solicitações',
                intro: 'Gerencie pedidos feitos aos clientes. Veja respostas por texto ou anexo e cobre pendências.',
                view: 'solicitacoes'
            },
            {
                element: '#formDemandaWeb',
                title: '7. CRM - Demandas Internas',
                intro: 'Use este formulário para criar novas tarefas na esteira NCE. Defina o depto, a ação e o vencimento estratégico.',
                view: 'comunicacao'
            },
            {
                element: '#formSolicitarWeb',
                title: '8. CRM - Solicitação / Pendências',
                intro: 'O canal seguro para pedir documentos ao cliente. A mensagem é rastreada e gera protocolos automáticos.',
                view: 'comunicacao'
            },
            {
                element: '#txtLastSync',
                title: '9. Sincronização em Tempo Real',
                intro: 'O portal se mantém "vivo" conectando-se ao banco de dados a cada 30s. Aqui você vê a última atualização.',
                position: 'top'
            },
            {
                element: '#avatarUser',
                title: '10. Perfil e Privilégios',
                intro: 'Identifique seu e-mail e nível de acesso. A segurança é nossa prioridade máxima.',
                position: 'top'
            }
        ],
        nextLabel: 'Próximo →',
        prevLabel: '← Voltar',
        doneLabel: 'Concluir Tour',
        showProgress: true,
        showBullets: false,
        exitOnOverlayClick: false,
        tooltipClass: 'tour-premium-tooltip'
    });

    // Lógica de Sincronização e Navegação Automática
    tour.onbeforechange(function(targetElement) {
        // Esconde o tooltip temporariamente para evitar "ghosting" da mensagem antiga
        const tooltip = document.querySelector('.introjs-tooltip');
        if (tooltip) tooltip.style.opacity = '0';

        const step = this._options.steps[this._currentStep];
        if (step && step.view && window.currentView !== step.view) {
            navigate(step.view);
            
            // Retornamos uma Promise para o IntroJS esperar o carregamento
            return new Promise((resolve) => {
                let checkCount = 0;
                const checkInterval = setInterval(() => {
                    checkCount++;
                    // Se o container não tiver mais apenas o loader/skeleton, ou se passarem 5 segundos (timeout)
                    const containerId = 'container' + step.view.charAt(0).toUpperCase() + step.view.slice(1);
                    const container = document.getElementById(containerId);
                    const isLoaded = container && container.innerHTML.indexOf('fa-fade') === -1 && container.innerHTML.indexOf('skeleton') === -1;
                    
                    // Caso específico para CRM que é estático
                    const isCrm = step.view === 'comunicacao';

                    if (isLoaded || isCrm || checkCount > 20) {
                        clearInterval(checkInterval);
                        setTimeout(() => {
                            if (tooltip) tooltip.style.opacity = '1';
                            tour.refresh(); // Garante posição correta após mudança de DOM
                            resolve();
                        }, 400); // Buffer para estabilidade visual
                    }
                }, 200);
            });
        } else {
            if (tooltip) tooltip.style.opacity = '1';
        }
    });

    tour.oncomplete(function() {
        localStorage.setItem('jp_tour_done', 'true');
        const btnTour = document.getElementById('btnTourTutorial');
        if(btnTour) btnTour.classList.remove('btn-pulse');
    });

    tour.onexit(function() {
        if (isAuto) {
            localStorage.setItem('jp_tour_done', 'true');
            const btnTour = document.getElementById('btnTourTutorial');
            if(btnTour) btnTour.classList.remove('btn-pulse');
        }
    });

    tour.start();
}
