<script>
  let arquivosStaged = [], pendenciasLocal = [];
  let preSelecaoObrigacaoId = null; 
  let payloadGlobalCache = null;

  document.addEventListener('DOMContentLoaded', () => {
    carregarPayloadInicial();
  });

  function showFeedback(msg, isError = false) {
    const f = document.getElementById('feedbackArea'); 
    if(!f) return;
    f.textContent = msg.toUpperCase();
    f.style.color = isError ? "#ef4444" : "#1C3051";
    f.classList.add('feedback-show'); 
    setTimeout(() => f.classList.remove('feedback-show'), 5000);
  }

  function carregarPayloadInicial() {
    showLoader("Inicializando NCE...");
    google.script.run
      .withFailureHandler(err => {
        console.error("Erro na carga inicial:", err);
        showFeedback("Falha de conexão com servidor", true);
        hideLoader();
      })
      .withSuccessHandler(payload => {
        payloadGlobalCache = payload;
        
        // 1. Renderiza Clientes
        const idsClientes = ['clienteUpload', 'demandaCliente', 'solicitarCliente'];
        idsClientes.forEach(id => {
          const s = document.getElementById(id);
          if (!s) return;
          s.innerHTML = '<option value="">-- CLIENTE --</option>';
          payload.clientes.forEach(n => { 
            const o = document.createElement('option'); o.value = n; o.textContent = n; s.appendChild(o); 
          });
        });

        // 2. Renderiza Tipos de Demanda
        const sDemanda = document.getElementById('demandaTipo');
        if (sDemanda) {
          sDemanda.innerHTML = '<option value="">-- SELECIONE --</option>';
          payload.tiposDemanda.forEach(t => { 
            const o = document.createElement('option'); o.value = t; o.textContent = t; sDemanda.appendChild(o); 
          });
          const oOutro = document.createElement('option'); oOutro.value = 'OUTROS'; oOutro.textContent = 'OUTROS'; sDemanda.appendChild(oOutro);
        }

        // 3. Pré-renderiza Prioridades Em Background
        renderizarCardsPrioridade(payload.prioridadesUser);

        hideLoader();
      }).getPayloadInicialPainel();
  }

  function aoMudarClienteDemanda() {
    const cli = document.getElementById('demandaCliente').value;
    document.getElementById('camposDemanda').style.display = cli ? 'block' : 'none';
  }

  function aoMudarClienteSolicitar() {
    const cli = document.getElementById('solicitarCliente').value;
    const campos = document.getElementById('camposSolicitar');
    if (!cli) { campos.style.display = 'none'; return; }
    showLoader("Buscando Tarefas...");
    google.script.run.withSuccessHandler(tarefas => {
        const s = document.getElementById('solicitarTarefa');
        s.innerHTML = '<option value="AVULSA">SOLICITAÇÃO AVULSA</option>';
        tarefas.forEach(t => { const o = document.createElement('option'); o.value = t.id; o.textContent = t.nome + " [" + t.vencimento + "]"; s.appendChild(o); });
        campos.style.display = 'block';
        hideLoader();
      }).getPendenciasCliente(cli);
  }

  function setPrazo(tipo) {
    const btnHoje = document.getElementById('btnHoje');
    const btnData = document.getElementById('btnData');
    const inputData = document.getElementById('demandaData');
    if (tipo === 'hoje') {
      btnHoje.classList.add('active'); btnData.classList.remove('active'); inputData.style.display = 'none';
      const hoje = new Date(); inputData.value = hoje.toISOString().split('T')[0];
    } else {
      btnHoje.classList.remove('active'); btnData.classList.add('active'); inputData.style.display = 'block';
    }
  }

  function carregarPrioridades() {
    // Agora é um wrap da carga local (ou Refresh Silencioso se desejar)
    if (payloadGlobalCache && payloadGlobalCache.prioridadesUser) {
       renderizarCardsPrioridade(payloadGlobalCache.prioridadesUser);
    } else {
       // Fallback caso a aba seja aberta antes do payload chegar
       document.getElementById('prioridadeList').innerHTML = '<div style="text-align:center; padding:20px; font-size:10px; font-weight:900; color:#1C3051;">AGUARDE O INÍCIO...</div>';
    }
  }

  function renderizarCardsPrioridade(tasks) {
    const list = document.getElementById('prioridadeList');
    if (!list) return;

    if (!tasks || tasks.length === 0) {
      list.innerHTML = `<div style="text-align:center; padding:40px 20px;"><div style="font-size:10px; color:#64748b; font-weight:900;">TUDO EM DIA!</div></div>`;
      return;
    }

    list.innerHTML = '';
    tasks.forEach(t => {
      const card = document.createElement('div');
      card.className = 'priority-card';
      card.onclick = function() { usarPrioridade(t.cliente, t.id); };
      card.style.cursor = "pointer";
      const textoAcao = t.acao || "---";
      const ehEnvio = textoAcao.toUpperCase().indexOf('ENVIAR') > -1;
      const corAcao = ehEnvio ? '#059669' : '#475569';
      const bgAcao = ehEnvio ? '#D1FAE5' : '#E2E8F0';
      
      card.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div style="flex:1; padding-right:10px;">
            <div style="font-size:11px; font-weight:900; color:#1C3051; text-transform:uppercase; line-height:1.2;">${t.cliente}</div>
            <div style="font-size:10px; color:#475569; font-weight:600; margin-top:3px;">${t.obrigacao}</div>
          </div>
          <div style="text-align:right; min-width:80px;">
            <div style="font-size:10px; font-weight:900; color:#ef4444;">${t.vencimentoStr}</div>
            <div style="font-size:8px; color:#94a3b8; font-weight:800; text-transform:uppercase; margin-top:2px; letter-spacing:0.5px;">${t.depto}</div>
            <div style="font-size:8px; color:${corAcao}; background:${bgAcao}; font-weight:900; text-transform:uppercase; margin-top:4px; padding:2px 5px; border-radius:4px; display:inline-block;">${textoAcao}</div>
          </div>
        </div>
        <div style="font-size:8px; color:#1C3051; text-align:center; margin-top:8px; font-weight:900; opacity:0.6;">CLIQUE PARA RESOLVER</div>
      `;
      list.appendChild(card);
    });
  }

  function usarPrioridade(clienteNome, idObrigacao) {
    mudarAba('upload');
    const selectCli = document.getElementById('clienteUpload');
    selectCli.value = clienteNome;
    preSelecaoObrigacaoId = idObrigacao;
    carregarPendencias();
  }

  function carregarPendencias() {
    const c = document.getElementById('clienteUpload').value; 
    if (!c) return;
    showLoader("Buscando...");
    google.script.run
      .withFailureHandler(err => {
        showFeedback("Erro de conexão", true);
        hideLoader();
        preSelecaoObrigacaoId = null;
      })
      .withSuccessHandler(pendencias => {
        pendenciasLocal = pendencias;
        const s = document.getElementById('obrigacao'); 
        s.disabled = false;
        s.innerHTML = pendencias.length ? '<option value="">-- SELECIONE A OBRIGAÇÃO --</option>' : '<option value="">SEM PENDÊNCIAS</option>';
        pendencias.forEach(p => { 
          const o = document.createElement('option'); 
          o.value = p.id; 
          o.textContent = p.nome + " [" + p.vencimento + "]"; 
          s.appendChild(o); 
        });
        if (preSelecaoObrigacaoId) {
            s.value = preSelecaoObrigacaoId;
            if (s.value === preSelecaoObrigacaoId) {
                atualizarInterfacePorAcao();
            } else {
                showFeedback("Tarefa não encontrada.");
            }
            preSelecaoObrigacaoId = null;
        }
        hideLoader();
      }).getPendenciasCliente(c);
  }

  function atualizarInterfacePorAcao() {
    const id = document.getElementById('obrigacao').value;
    const t = pendenciasLocal.find(p => String(p.id) === String(id));
    const btnFin = document.getElementById('btnFinalizar');
    const arq = document.getElementById('areaArquivos');
    const esc = document.getElementById('btnEscolher');
    
    if (!t) {
        console.warn("Nenhuma pendência encontrada para o ID:", id);
        document.getElementById('statusAcaoArea').innerHTML = '';
        if (arq) arq.style.display = 'none';
        if (esc) esc.style.display = 'none';
        return;
    }

    const acaoRaw = t.acao || "ARQUIVAR";
    const acao = String(acaoRaw).toUpperCase().trim();
    console.log("Ação identificada:", acao, "para a tarefa:", t.nome);
    
    const ehEnvio = acao.indexOf("ENVIAR") > -1;
    const ehAuditoria = acao.indexOf("AUDITAR") > -1;
    
    let statusHtml = `<div class="status-badge">AÇÃO: ${acao}</div>`;
    if (ehEnvio) statusHtml = '<div class="status-badge badge-enviar">AÇÃO: ENVIAR PARA CLIENTE</div>';
    if (ehAuditoria) statusHtml = '<div class="status-badge badge-auditar">AÇÃO: AUDITAGEM CONTÁBIL</div>';
    
    document.getElementById('statusAcaoArea').innerHTML = statusHtml;
    
    const precisaUpload = ehEnvio || ehAuditoria;
    if (arq) arq.style.display = precisaUpload ? 'block' : 'none'; 
    if (esc) esc.style.display = precisaUpload ? 'block' : 'none';
    
    btnFin.disabled = precisaUpload && (!arquivosStaged || !arquivosStaged.length);
  }

  async function adicionarArquivos() {
    const fs = document.getElementById('fileInput').files;
    if (!fs || fs.length === 0) return;
    
    showLoader("Lendo " + fs.length + " arquivo(s)..."); 
    
    try {
      const promessasLeitura = Array.from(fs).map(file => {
        return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = (e) => {
            resolve({ 
              name: file.name, 
              base64: e.target.result.split(',')[1] 
            });
          };
          r.onerror = () => reject(new Error("Falha ao ler o arquivo " + file.name));
          r.readAsDataURL(file);
        });
      });

      const novosArquivos = await Promise.all(promessasLeitura);
      arquivosStaged = arquivosStaged.concat(novosArquivos);
      
      renderizarLista(); 
      atualizarInterfacePorAcao();
      
    } catch (e) {
      console.error(e);
      showFeedback("Erro na leitura dos arquivos.", true);
    } finally {
      hideLoader();
      document.getElementById('fileInput').value = ""; 
    }
  }

  function removerArquivo(index) {
    arquivosStaged.splice(index, 1);
    renderizarLista();
    atualizarInterfacePorAcao();
  }

  function renderizarLista() {
    const d = document.getElementById('fileListDisplay'); 
    const btnEsc = document.getElementById('btnEscolher');
    
    if (arquivosStaged.length === 0) {
      d.innerHTML = '<span style="color:#94a3b8; font-size:10px;">Vazio</span>';
      btnEsc.textContent = "ANEXAR";
      return;
    }

    btnEsc.textContent = `ANEXAR (+${arquivosStaged.length})`;
    d.innerHTML = '';
    arquivosStaged.forEach((f, i) => { 
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = `
        <span>${i + 1}. ${f.name}</span>
        <span class="btn-remove" onclick="removerArquivo(${i})">✕</span>
      `;
      d.appendChild(item);
    });
  }

  async function finalizarProcesso() {
    const id = document.getElementById('obrigacao').value;
    const cli = document.getElementById('clienteUpload').value;
    if(!id || !cli) { showFeedback("Selecione os campos", true); return; }
    
    // Validar se há arquivos (Obrigatório para o fluxo atual)
    if (arquivosStaged.length === 0) {
      showFeedback("Por favor, anexe o arquivo antes de finalizar.", true);
      return;
    }
    
    showLoader("Processando via WebApp...");
    google.script.run
      .withFailureHandler(err => {
        console.error(err);
        showFeedback("Falha ao obter URL HTTP: " + err.message, true);
        hideLoader();
      })
      .withSuccessHandler(async urlWebApp => {
         try {
           const payload = {
             action: "uploadBatch",
             arquivos: arquivosStaged,
             taskId: id,
             clienteNome: cli
           };
           
           const resposta = await fetch(urlWebApp, {
             method: 'POST',
             body: JSON.stringify(payload),
             headers: { 'Content-Type': 'text/plain;charset=utf-8' } // text/plain para evitar preflight CORS no script.google.com
           });
           
           const result = await resposta.json();
           if (result.success) {
             limparTudo(); 
             if (result.dispararEmailVIP) {
               showFeedback("Auditoria Aprovada! O Relatório VIP está sendo gerado em 2º plano e será enviado por e-mail em instantes.");
               // Chama o server e esquece (fire and forget)
               google.script.run.processarAuditoriaRelatorioBackground(result.backgroundPayload);
             } else if (result.auditoriaRodou) {
               showFeedback("Auditoria Aprovada e Tarefa Concluída!");
             } else {
               showFeedback("Concluído!"); 
             }
           } else {
             showFeedback("Falha: " + (result.error || result.message), true);
           }
         } catch (errFetch) {
           console.error("Erro no Fetch: ", errFetch);
           showFeedback("Erro de conexão com WebApp", true);
         } finally {
           hideLoader();
         }
      }).getUrlParaFetch();
  }

  function criarTarefaDemanda() {
    const cli = document.getElementById('demandaCliente').value;
    const tipo = document.getElementById('demandaTipo').value;
    const compl = document.getElementById('demandaComplemento').value;
    const depto = document.getElementById('demandaDepto').value;
    const acao = document.getElementById('demandaAcao').value;
    let prazo = document.getElementById('demandaData').value;
    if (!prazo || document.getElementById('btnHoje').classList.contains('active')) {
      const hoje = new Date();
      prazo = hoje.toISOString().split('T')[0];
    }
    if (!cli || !tipo) { showFeedback("Campos Obrigatórios!", true); return; }
    showLoader("Criando...");
    google.script.run.withSuccessHandler(res => {
        showFeedback("Criada!");
        document.getElementById('demandaForm').reset();
        setPrazo('hoje');
        aoMudarClienteDemanda();
        hideLoader();
      }).salvarTarefaDemanda({ cliente: cli, tipo: tipo, compl: compl, prazo: prazo, depto: depto, acao: acao });
  }

  function enviarSolicitacao() {
    const cli = document.getElementById('solicitarCliente').value;
    const tarefa = document.getElementById('solicitarTarefa').value;
    const texto = document.getElementById('solicitarTexto').value;
    if (!cli || !texto) { showFeedback("Preencha os campos!", true); return; }
    showLoader("Enviando...");
    google.script.run.withSuccessHandler(res => {
        showFeedback("Solicitação Enviada!");
        document.getElementById('solicitarForm').reset();
        document.getElementById('camposSolicitar').style.display = 'none';
        hideLoader();
      }).enviarSolicitacaoDocumento({ cliente: cli, idTarefa: tarefa, solicitacao: texto });
  }

  function limparTudo() { 
    arquivosStaged = []; 
    document.getElementById('fileInput').value = "";
    renderizarLista(); 
    const obriSel = document.getElementById('obrigacao');
    if (obriSel) { obriSel.innerHTML = '<option value="">Selecione o cliente</option>'; obriSel.disabled = true; }
    document.getElementById('statusAcaoArea').innerHTML = '';
    document.getElementById('areaArquivos').style.display = 'none';
    document.getElementById('btnEscolher').style.display = 'none';
    const btnFin = document.getElementById('btnFinalizar');
    if (btnFin) btnFin.disabled = true;
  }
  
  function showLoader(t) { document.getElementById('loaderText').textContent = t; document.getElementById('loader').style.display = 'flex'; }
  function hideLoader() { document.getElementById('loader').style.display = 'none'; }
  
  function mudarAba(a) {
    document.querySelectorAll('.container').forEach(e => e.classList.remove('show'));
    document.querySelectorAll('.tab').forEach(e => e.classList.remove('active-upload'));
    document.getElementById('view' + a.charAt(0).toUpperCase() + a.slice(1)).classList.add('show');
    document.getElementById('tab' + a.charAt(0).toUpperCase() + a.slice(1)).classList.add('active-upload');
    if (a === 'pendentes') carregarPrioridades();
  }
</script>
