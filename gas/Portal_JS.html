<script>
/**
 * Portal_JS.html | Lógica de Interface do Cliente
 * Single Page Application Controller
 */

window.GIS_TOKEN = window.INITIAL_TOKEN || null; // Token de Segurança do GIS (pode vir via Redirect)
window.GIS_TOKEN_TIMESTAMP = null; // Momento em que o token foi obtido
const GOOGLE_CLIENT_ID = window.GOOGLE_CLIENT_ID;
const GIS_TOKEN_MAX_AGE_MS = 45 * 60 * 1000; // 45 minutos (token expira em ~60min, renovamos antes)

// Callback do Google Identity Services (Executado no modo Popup ou manualmente no Redirect)
function handleCredentialResponse(response) {
   if (response && response.credential) {
      window.GIS_TOKEN = response.credential;
      window.GIS_TOKEN_TIMESTAMP = Date.now(); // Registra momento da obtenção
      heartbeatFailures = 0; // Reset contador de falhas
      const fb = document.getElementById('gisFeedback');
      if (fb) {
         fb.classList.remove('hidden', 'bg-red-50', 'text-red-600');
         fb.classList.add('bg-emerald-50', 'text-emerald-600');
         fb.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Autenticado. Carregando seus dados...';
      }
      
      // Tenta decodificar o e-mail no cliente apenas para exibição inicial
      try {
         const payload = JSON.parse(atob(response.credential.split('.')[1]));
         if (payload && payload.email) {
            document.getElementById('currentUserEmail').textContent = payload.email.toLowerCase();
            setAvatarInitials(payload.email);
         }
      } catch (e) {}
      
      // Esconde o botão e inicia a autorização com o backend
      document.getElementById('gisButtonContainer').classList.add('hidden');
      carregarDadosBase();
   }
}

/**
 * 🔄 Verifica se o token GIS está próximo da expiração e tenta renovar silenciosamente.
 * Se a renovação silenciosa falhar, força re-autenticação via redirect.
 */
function verificarERenovarToken() {
   if (!window.GIS_TOKEN || !window.GIS_TOKEN_TIMESTAMP) return;
   
   const idade = Date.now() - window.GIS_TOKEN_TIMESTAMP;
   if (idade < GIS_TOKEN_MAX_AGE_MS) return; // Token ainda é jovem, nada a fazer
   
   console.log("Token GIS próximo da expiração (" + Math.round(idade / 60000) + "min). Renovando...");
   
   try {
      // Tenta renovação silenciosa via One Tap (auto_select)
      google.accounts.id.initialize({
         client_id: GOOGLE_CLIENT_ID,
         callback: handleCredentialResponse,
         auto_select: true,
         cancel_on_tap_outside: true
      });
      google.accounts.id.prompt((notification) => {
         if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
            console.warn("Renovação silenciosa não disponível. Token será validado pelo backend via fallback.");
            // O backend tem fallback de decodificação local do JWT,
            // então o sistema continua funcionando mesmo com token expirado
         }
      });
   } catch (e) {
      console.warn("Erro na renovação de token:", e);
   }
}

// Inicialização do Google Identity Services Onload
window.onload = function () {
   if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.indexOf('SEU_CLIENT_ID_AQUI') > -1) {
      const fb = document.getElementById('gisFeedback');
      fb.classList.remove('hidden');
      fb.className = "text-xs font-bold px-4 py-3 rounded mb-4 bg-orange-100 text-orange-700 border border-orange-200 relative z-10 w-full text-center";
      fb.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-2"></i> Client ID não configurado no servidor. O Login está desabilitado.';
      return;
   }

   // 🚀 Se já temos um token (vindo do Redirect), processamos ele direto
   if (window.GIS_TOKEN) {
      handleCredentialResponse({ credential: window.GIS_TOKEN });
      return;
   }
   
   google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      ux_mode: 'redirect',
      login_uri: window.SCRIPT_URL,
      auto_select: true, // Tenta logar automaticamente caso tenha apenas 1 conta
      cancel_on_tap_outside: false
   });
   
   google.accounts.id.renderButton(
      document.getElementById("gisButtonContainer"),
      { theme: "outline", size: "large", type: "standard", shape: "pill", width: 280 }
   );
};

// Ao carregar a página
document.addEventListener("DOMContentLoaded", function(event) {
    document.getElementById('currentUserEmail').textContent = "Aguardando Login...";
    // O carregamento agora é engatilhado apenas APÓS o login (handleCredentialResponse)
    
    // 🔄 Sincronização Periódica de Dados (60 segundos)
    setInterval(() => {
        if (window.GIS_TOKEN) {
            verificarERenovarToken(); // Verifica e renova token antes de sincronizar
            carregarDadosBase(true);
        }
    }, 60000);

    // 💓 Heartbeat / Keep-Alive (4 minutos)
    // Evita que o ambiente de execução do Apps Script hiberne ou que a tela fique branca.
    setInterval(() => {
        if (window.GIS_TOKEN) {
            console.log("[Heartbeat] Pulso de manutenção...");
            google.script.run
                .withFailureHandler(err => {
                    console.error("[Heartbeat] Falha:", err);
                    handleHeartbeatFailure();
                })
                .withSuccessHandler(() => {
                    console.log("[Heartbeat] Sessão ativa.");
                    heartbeatFailures = 0; // Reset em caso de sucesso
                })
                .keepAlive();
        }
    }, 240000); // 4 minutos (mais agressivo que 5min para evitar hibernação)

    // 🔄 DETECÇÃO DE RETORNO: Page Visibility API
    // Detecta quando o usuário volta para a aba após inatividade
    document.addEventListener('visibilitychange', function() {
       if (document.visibilityState === 'visible' && window.GIS_TOKEN) {
          const inatividade = Date.now() - lastVisibleTimestamp;
          const minInativo = Math.round(inatividade / 60000);
          console.log("[Visibility] Retorno após " + minInativo + " min.");

          if (inatividade > GIS_TOKEN_MAX_AGE_MS) {
             // Token expirado (>45 min) — Ao invés de reload (tela branca), tenta renovar suavemente
             const banner = document.createElement('div');
             banner.id = 'reconnectBannerInatividade';
             banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(135deg,#1C3051,#2A4571);color:white;padding:16px 24px;text-align:center;font-family:Inter,sans-serif;font-size:13px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;gap:12px;';
             banner.innerHTML = '<i class="fa-solid fa-rotate fa-spin" style="font-size:16px;"></i> Sessão pausada por inatividade. Reconectando dados...';
             document.body.prepend(banner);
             
             verificarERenovarToken();
             setTimeout(() => {
                carregarDadosBase(true);
                const b = document.getElementById('reconnectBannerInatividade');
                if (b) b.remove();
             }, 2500);
          } else if (inatividade > 300000) {
             // Inativo > 5 min — Renova token e resincroniza
             verificarERenovarToken();
             setTimeout(() => carregarDadosBase(true), 1500);
          }
       }
       if (document.visibilityState === 'visible') {
          lastVisibleTimestamp = Date.now();
       }
    });
});

let heartbeatFailures = 0;
let lastVisibleTimestamp = Date.now();
let syncFailures = 0;
function handleHeartbeatFailure() {
    heartbeatFailures++;
    console.warn("[Heartbeat] Falha #" + heartbeatFailures);
    
    if (heartbeatFailures >= 2) {
        // Mostra aviso visual ao usuário sem dar reload forçado (evita tela branca)
        const banner = document.createElement('div');
        banner.id = 'reconnectBanner';
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(135deg,#1C3051,#2A4571);color:white;padding:16px 24px;text-align:center;font-family:Inter,sans-serif;font-size:13px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;gap:12px;';
        banner.innerHTML = '<i class="fa-solid fa-link-slash" style="font-size:16px;"></i> Conexão pausada. <button onclick="document.getElementById(\'reconnectBanner\').remove(); heartbeatFailures=0; verificarERenovarToken(); carregarDadosBase(true);" style="margin-left:10px; padding: 4px 12px; background: white; color: #1C3051; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; font-size: 11px; text-transform: uppercase;">Reconectar Agora</button>';
        
        // Remove banner antigo se existir
        const old = document.getElementById('reconnectBanner');
        if (old) old.remove();
        
        document.body.prepend(banner);
    }
}

let tarefasGlobaisBase = []; // Cache das tarefas para busca Local
let historicoGlobalBase = []; // Cache do arquivo morto
window.userDataGlobal = null; // Armazena nível e e-mail do usuário logado
window.currentView = 'dashboard'; 

// ═══════════════ UTILITÁRIOS PREMIUM ═══════════════
function debounce(fn, delay) {
  let timer;
  return function() {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, arguments), delay);
  };
}

const _debouncedTarefas = debounce(() => filtrarTarefasWeb(), 300);
function debounceTarefas() { _debouncedTarefas(); }

const _debouncedHistorico = debounce(() => filtrarHistoricoWeb(), 300);
function debounceHistorico() { _debouncedHistorico(); }

const _debouncedSolicitacoes = debounce(() => filtrarSolicitacoesWeb(), 300);
function debounceSolicitacoes() { _debouncedSolicitacoes(); }

const _debouncedProtocolos = debounce(() => filtrarProtocolosHistorico(), 300);
function debounceProtocolos() { _debouncedProtocolos(); }

function animateCounter(el, target) {
  const num = parseInt(target, 10);
  if (isNaN(num)) { el.textContent = target; return; }
  const duration = 600;
  const start = performance.now();
  const from = 0;
  function step(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(from + (num - from) * eased);
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebarEl');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('active');
}

function setAvatarInitials(email) {
  const av = document.getElementById('avatarUser');
  if (!av || !email) return;
  const parts = email.split('@')[0].split(/[._-]/);
  let initials = parts.length >= 2 
    ? (parts[0][0] + parts[1][0]).toUpperCase() 
    : parts[0].substring(0, 2).toUpperCase();
  av.innerHTML = initials;
}


/**
 * Realiza Fetch das Vistas Iniciais (Sub-segundo / Single Request)
 */
function carregarDadosBase(isAutoSync) {
    const txtSync = document.getElementById('txtLastSync');
    const agora = new Date().toLocaleTimeString('pt-BR');

    if (isAutoSync === true) {
        // Proteção de Trabalho: Não refrescar se estiver no CRM ou Modal aberto
        const currentView = document.querySelector('.view-content:not(.hidden)')?.id;
        if (currentView === 'comunicacao' || (typeof tarefaEmFoco !== 'undefined' && tarefaEmFoco !== null)) {
            if (txtSync) txtSync.textContent = agora; // Atualiza o relógio para mostrar que o sistema está operante
            return;
        }
    }

    google.script.run
      .withFailureHandler(function(err) {
         console.error("[Sync] Erro:", err);
         if (isAutoSync === true) {
            syncFailures++;
            console.warn("[Sync] Falha automática #" + syncFailures);
            if (syncFailures >= 3) {
               handleHeartbeatFailure();
            }
         } else {
            document.getElementById('currentUserEmail').textContent = "Falha!";
         }
      })
      .withSuccessHandler(function(res) {
          syncFailures = 0;
          if(!res.success) {
             if (res.error === "SISTEMA_BLOQUEADO" || res.error === "LOGIN_REQUERIDO") {
                 const overlay = document.getElementById('overlayBloqueio');
                 const msg = document.getElementById('msgBloqueio');
                 const title = overlay.querySelector('h2');
                 const icon = overlay.querySelector('i');

                 overlay.classList.remove('hidden');
                 msg.textContent = res.message;
                 
                 if (res.error === "LOGIN_REQUERIDO") {
                     title.textContent = "Login Necessário";
                     icon.className = "fa-solid fa-user-lock text-4xl";
                 }

                 document.querySelector('aside').classList.add('hidden'); // Esconde sidebar
                 document.querySelector('main').classList.add('hidden');  // Esconde conteúdo
             }
             console.error("Erro Backend:", res.error);
             return;
          }
          
          if (txtSync) txtSync.textContent = agora;
          window.userDataGlobal = res; // Salva para uso em modais e filtros
          
          const userEmailStr = String(res.userEmail).toLowerCase();
          document.getElementById('currentUserEmail').textContent = userEmailStr;
          document.getElementById('currentUserLevel').textContent = (res.userName || "Usuário") + " - " + res.userLevel;
          setAvatarInitials(userEmailStr);
          
          // Exibir Seletor de Departamento para Admin e Injetar numéricos
          const adminDeptoSelectorContainer = document.getElementById('adminDeptoSelectorContainer');
          if (adminDeptoSelectorContainer && res.userLevel === "ADMIN") {
             adminDeptoSelectorContainer.classList.remove('hidden');
          }
          
          const selAdmin = document.getElementById('adminDeptoSelector');
          if (selAdmin && selAdmin.value !== "ALL" && res.userLevel === "ADMIN") {
              filtrarDashboardAdmin(); // Aplica filtro existente
          } else {
              const dPendentes = document.getElementById('dash-pendentes');
              const dEntregues = document.getElementById('dash-entregues');
              const dRisco = document.getElementById('dash-risco');
              
              if(dPendentes) animateCounter(dPendentes, res.dash.pendentes);
              if(dEntregues) animateCounter(dEntregues, res.dash.entregues);
              if(dRisco) animateCounter(dRisco, res.dash.risco);
          }
          
          // 1.1 Injetar Gráficos de Setores e Equipe
          renderizarBarrasPerformance('dash-deptos-box', res.dash.departamentos, 'indigo');
          renderizarBarrasPerformance('dash-users-box', res.dash.usuarios, 'emerald');

          // 2. Injetar layout HTML puro para a Fila de Prioridades
          tarefasGlobaisBase = res.prioridades;
          if (typeof filtrarTarefasWeb === 'function') filtrarTarefasWeb(); else renderizarTarefas(tarefasGlobaisBase);
          
          // 2. Contador de Revisões (Badge)
          const revCount = tarefasGlobaisBase.filter(t => (t.status || "").toUpperCase() === "REVISAO").length;
          const badgeRev = document.getElementById('badgeRevisoesCount');
          if (badgeRev) {
             if (revCount > 0) {
                badgeRev.textContent = revCount;
                badgeRev.classList.remove('hidden');
             } else {
                badgeRev.classList.add('hidden');
             }
          }
          
          // 2.2 Injetar Revisões se for Admin
          if (res.userLevel === "ADMIN") {
             renderizarRevisoes(tarefasGlobaisBase);
          }
          
          // 3. Popular Metabase CRM
          if (isAutoSync !== true) {
              const cliDemanda = document.getElementById('demandaClienteWeb');
              const cliSol = document.getElementById('solicitarClienteWeb');
              const tipoDem = document.getElementById('demandaTipoWeb');
              
              if(cliDemanda && cliSol) {
                 let htmlCli = '<option value="">-- SELECIONE O CLIENTE --</option>';
                 let htmlCliGlobal = '<option value="ALL">🚨 TODA A CARTEIRA DE CLIENTES ATIVOS</option>';
                 res.clientes.forEach(c => {
                    htmlCli += `<option value="${c}">${c}</option>`;
                    htmlCliGlobal += `<option value="${c}">${c}</option>`;
                 });
                 cliDemanda.innerHTML = htmlCli;
                 cliSol.innerHTML = htmlCli;
                 
                 const selectGlobal = document.getElementById('selectClienteGlobal');
                 if(selectGlobal) selectGlobal.innerHTML = htmlCliGlobal;
              }
              if(tipoDem) {
                 let htmlTipo = '<option value="">-- SELECIONE O CLASSIFICADOR --</option>';
                 res.tiposDemanda.forEach(t => htmlTipo += `<option value="${t}">${t}</option>`);
                 htmlTipo += '<option value="OUTROS">CÓDIGO GENÉRICO (OUTROS)</option>';
                 tipoDem.innerHTML = htmlTipo;
              }
          }
          
          // 5. Protocolos agora usam Lazy Loading (carregados sob demanda na aba)
          // NOVO: Forçamos o refresh do Lazy Load em background sempre que recarregarDados ocorrer.
          if (typeof carregarProtocolosServer === "function") {
             carregarProtocolosServer(true, true);
          }
           
           // 5.1. SOLICITAÇÕES: Forçar refresh se já carregou antes
           if (carregouSolicitacoes) {
              if (window.currentView === 'solicitacoes') carregarSolicitacoesServer(true, true);
           }
          
          // 6. Exposição de Super Privilégios (RBAC)
          if (res.userLevel === "ADMIN") {
             const btnAdv = document.getElementById('navAdminWeb');
             if(btnAdv && btnAdv.classList.contains('hidden')) btnAdv.classList.remove('hidden');
             
             const btnRev = document.getElementById('navRevisoes');
             if(btnRev && btnRev.classList.contains('hidden')) btnRev.classList.remove('hidden');
          }
          
          // Oculta a tela de Login caso seja o primeiro acesso bem sucedido
          const loginOverlay = document.getElementById('gisLoginOverlay');
          if (loginOverlay && !loginOverlay.classList.contains('hidden')) {
             loginOverlay.classList.add('opacity-0');
             setTimeout(() => loginOverlay.classList.add('hidden'), 500);
             const fb = document.getElementById('gisFeedback');
             if(fb) fb.classList.add('hidden');
          }
          
          // 🚀 AUTO-START TOUR GUIADO (Apenas na primeira vez)
          if (!localStorage.getItem('jp_tour_done')) {
             const btnTour = document.getElementById('btnTourTutorial');
             if(btnTour) btnTour.classList.add('btn-pulse');

             setTimeout(() => {
                iniciarTourGuiado(true);
             }, 2000);
          }
          
      }).getDadosPortalWeb(window.GIS_TOKEN);
}

function renderizarBarrasPerformance(elementId, dataObj, colorBase) {
    const box = document.getElementById(elementId);
    if (!dataObj || Object.keys(dataObj).length === 0) {
        box.innerHTML = '<div class="text-center text-slate-400 py-6 text-[10px] uppercase font-bold tracking-widest">Sem movimentação registrada no período.</div>';
        return;
    }
    
    // Sort items by absolute volume (total) descending
    const items = Object.entries(dataObj).map(([name, stats]) => ({
       name: name.substring(0, 20),
       ...stats,
       pct: stats.total > 0 ? Math.round((stats.entregues / stats.total) * 100) : 0
    })).sort((a,b) => b.total - a.total);
    
    let html = '<div class="space-y-4">';
    items.forEach(i => {
       const bgTrack = colorBase === 'indigo' ? 'bg-indigo-100' : 'bg-emerald-100';
       const bgFill = colorBase === 'indigo' ? 'bg-indigo-500' : 'bg-emerald-500';
       
       html += `
         <div>
            <div class="flex justify-between text-[10px] font-bold text-slate-600 mb-1 tracking-wider uppercase">
               <span>${i.name}</span>
               <span class="text-slate-500">${i.entregues}/${i.total} <span class="${colorBase==='indigo'?'text-indigo-500':'text-emerald-500'}">(${i.pct}%)</span></span>
            </div>
            <div class="h-2.5 w-full ${bgTrack} rounded-full overflow-hidden">
               <div class="h-full ${bgFill} transition-all duration-1000 ease-out flex items-center justify-end pr-1 text-[8px] text-white font-bold" style="width: ${i.pct}%">${i.pct >= 15 ? i.pct+'%' : ''}</div>
            </div>
         </div>
       `;
    });
    html += '</div>';
    
    box.innerHTML = html;
}

function filtrarDashboardAdmin() {
   if (!window.userDataGlobal || !window.userDataGlobal.dash) return;
   const depto = document.getElementById('adminDeptoSelector').value;
   const dash = window.userDataGlobal.dash;
   
   let p = 0, e = 0, r = 0;
   
   if (depto === "ALL") {
      p = dash.pendentes;
      e = dash.entregues;
      r = dash.risco;
   } else {
      if (dash.departamentos && dash.departamentos[depto]) {
         p = dash.departamentos[depto].pendentes || 0;
         e = dash.departamentos[depto].entregues || 0;
      }
      if (dash.riscoPorDepto && dash.riscoPorDepto[depto]) {
         r = dash.riscoPorDepto[depto] || 0;
      }
   }
   
   const dPendentes = document.getElementById('dash-pendentes');
   const dEntregues = document.getElementById('dash-entregues');
   const dRisco = document.getElementById('dash-risco');
   
   if(dPendentes) animateCounter(dPendentes, p);
   if(dEntregues) animateCounter(dEntregues, e);
   if(dRisco) animateCounter(dRisco, r);
}

/**
 * Transforma Objeto JSON (Tarefas) em Cards Visuais e injeta no DOM
 */
function renderizarTarefas(tarefas) {
    const box = document.getElementById('containerTarefas');
    if (!box) return;
    
    if (!tarefas || tarefas.length === 0) {
        box.innerHTML = '<div class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full"><i class="fa-solid fa-mug-hot text-5xl mb-4 opacity-50"></i><p>Tudo em dia! Sem pendências.</p></div>';
        return;
    }
    
    // Removemos os flex centrais (loader) caso haja dados:
    box.className = "flex-1 p-6 overflow-y-auto bg-slate-50"; 
    
    let html = '<div class="space-y-3">';
    tarefas.forEach(t => {
        const textoAcao = t.acao || "PROCESSAR";
        const status = (t.status || "").toUpperCase();
        const ehRevisao = status === "REVISAO";
        const ehEnvio = textoAcao.toUpperCase().indexOf('ENVIAR') > -1;
        
        // 🛡️ Detecção de competência futura
        const partesMesAno = String(t.mesAno).split('/');
        const mesComp = parseInt(partesMesAno[0]);
        const anoComp = parseInt(partesMesAno[1]);
        const agoraRef = new Date();
        const ehCompetenciaFutura = (anoComp > agoraRef.getFullYear()) || (anoComp === agoraRef.getFullYear() && mesComp > agoraRef.getMonth() + 1);
        
        let colorClass = ehEnvio ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-700';
        let borderClass = ehEnvio ? 'border-l-emerald-500' : 'border-l-slate-400 hover:border-l-indigo-500';
        
        if (ehRevisao) {
            colorClass = 'bg-sky-100 text-sky-700';
            borderClass = 'border-l-sky-500 bg-sky-50/30';
        }
        if (ehCompetenciaFutura && !ehRevisao) {
            borderClass = 'border-l-amber-500 bg-amber-50/30';
        }
        
        // Escape characters para previnir sintaxe error
        const idSafe = String(t.id).replace(/'/g, "\\'");
        const clienteSafe = String(t.cliente).replace(/'/g, "\\'");
        const obriSafe = String(t.obrigacao).replace(/'/g, "\\'");
        const mesAnoSafe = String(t.mesAno).replace(/'/g, "\\'");
        
         html += `
          <div onclick="abrirModalTarefa('${idSafe}', '${clienteSafe}', '${obriSafe}', '${t.vencimentoStr}', '${t.acao}', '${status}', '${t.docLinks || ''}', ${t.exigeRevisao || false}, '${mesAnoSafe}')" class="task-card flex items-center justify-between p-4 bg-white border border-slate-100 rounded-xl shadow-sm hover:shadow transition group cursor-pointer border-l-4 ${borderClass}">
             <div>
                <div class="flex items-center gap-2 mb-0.5">
                   <span class="${ehCompetenciaFutura ? 'bg-amber-500 text-white' : 'bg-slate-800 text-slate-100'} px-1.5 py-0.5 rounded text-[9px] font-bold tracking-widest shadow-sm">${t.mesAno}</span>
                   ${ehCompetenciaFutura ? '<span class="bg-amber-100 text-amber-700 border border-amber-300 px-1.5 py-0.5 rounded text-[8px] font-black tracking-widest shadow-sm">MÊS SEGUINTE</span>' : ''}
                   ${ehRevisao ? '<span class="bg-sky-600 text-white px-1.5 py-0.5 rounded text-[8px] font-black tracking-widest shadow-sm animate-pulse">EM REVISÃO</span>' : ''}
                   <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nível ${t.nivel} | Ref: ${t.id}</p>
                </div>

/**
 * Filtra e renderiza apenas tarefas com status REVISÃO para o Admin
 */
function renderizarRevisoes(tarefas) {
    const box = document.getElementById('listaRevisoesDinamica');
    if (!box) return;
    
    const revisoes = tarefas.filter(t => (t.status || "").toUpperCase() === "REVISAO");
    
    if (revisoes.length === 0) {
        box.innerHTML = '<div class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full"><i class="fa-solid fa-stamp text-5xl mb-4 opacity-50"></i><p>Nenhuma tarefa aguardando validação.</p></div>';
        return;
    }
    
    let html = '<div class="space-y-3">';
    revisoes.forEach(t => {
        const idSafe = String(t.id).replace(/'/g, "\\'");
        const clienteSafe = String(t.cliente).replace(/'/g, "\\'");
        const obriSafe = String(t.obrigacao).replace(/'/g, "\\'");
        
        html += `
          <div onclick="abrirModalTarefa('${idSafe}', '${clienteSafe}', '${obriSafe}', '${t.vencimentoStr}', '${t.acao}', 'REVISAO', '${t.docLinks || ''}')" class="task-card flex items-center justify-between p-4 bg-white border border-sky-100 rounded-xl shadow-sm hover:shadow transition group cursor-pointer border-l-4 border-l-sky-500 bg-sky-50/20">
             <div>
                <div class="flex items-center gap-2 mb-0.5">
                   <span class="bg-sky-600 text-white px-1.5 py-0.5 rounded text-[8px] font-black tracking-widest shadow-sm animate-pulse">REVISÃO PENDENTE</span>
                   <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ref: ${t.id}</p>
                </div>
                <p class="text-xs font-bold text-jp-navy uppercase tracking-wider">${t.cliente}</p>
                <div class="flex items-center gap-2">
                   <p class="text-sm text-slate-600 font-medium">${t.obrigacao}</p>
                   <span class="text-[9px] font-bold text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-100 uppercase">${t.depto}</span>
                </div>
             </div>
             <div class="text-right flex flex-col items-end">
                <p class="text-[11px] font-bold text-sky-600 mb-2"><i class="fa-regular fa-clock mr-1"></i> ${t.vencimentoStr}</p>
                <span class="text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-sky-100 text-sky-700 border border-sky-200 shadow-sm">VALIDAR AGORA</span>
             </div>
          </div>
        `;
    });
    html += '</div>';
    box.innerHTML = html;
}

function filtrarTarefasWeb() {
   const queryStr = document.getElementById('inputBuscaTarefas').value.toLowerCase().trim();
   if(!queryStr) { renderizarTarefas(tarefasGlobaisBase); return; }
   
   const terms = queryStr.split(/\s+/);
   const fList = tarefasGlobaisBase.filter(t => 
      terms.every(term =>
         t.cliente.toLowerCase().includes(term) || 
         t.obrigacao.toLowerCase().includes(term) ||
         String(t.id).toLowerCase().includes(term) ||
         (t.mesAno && t.mesAno.toLowerCase().includes(term)) ||
         (t.depto && t.depto.toLowerCase().includes(term))
      )
   );
   renderizarTarefas(fList);
}

// ================= LÓGICA DO MOTOR DE AÇÃO (MODAL DE RESOLUÇÃO) =================
let tarefaEmFoco = null;
let arquivosStagedWeb = [];
let precisaUploadWeb = false;

function abrirModalTarefa(id, cliente, obrigacao, vencimento, acaoRaw, status, docLinks, exigeRevisao, mesAno) {
    tarefaEmFoco = { id, cliente, obrigacao, vencimento, acao: acaoRaw, status: status, exigeRevisao: exigeRevisao, mesAno: mesAno || '' };
    
    document.getElementById('modalCliente').textContent = cliente;
    document.getElementById('modalObrigacao').textContent = obrigacao;
    document.getElementById('modalVcto').textContent = vencimento;
    
    const acao = String(acaoRaw || "").toUpperCase().trim();
    const ehRevisao = (status || "").toUpperCase() === "REVISAO";
    const ehEnvio = acao.indexOf("ENVIAR") > -1;
    const ehAuditoria = acao.indexOf("AUDITAR") > -1;
    const ehComunicar = acao.indexOf("COMUNICAR") > -1;
    const ehArquivar = acao.indexOf("ARQUIVAR") > -1;
    const isAdmin = window.userDataGlobal && (["ADMIN", "MASTER", "CONSULTOR"].indexOf(window.userDataGlobal.userLevel) > -1);
    
    let colorClass = "text-slate-600 border-slate-200 bg-slate-100";
    if(ehEnvio) colorClass = "text-emerald-700 border-emerald-200 bg-emerald-50";
    if(ehAuditoria) colorClass = "text-amber-700 border-amber-200 bg-amber-50";
    if(ehComunicar) colorClass = "text-white border-indigo-500 bg-indigo-600 shadow-md";
    if(ehRevisao) colorClass = "text-sky-700 border-sky-200 bg-sky-50 shadow-sm";
    
    const badge = document.getElementById('modalAcaoBadge');
    badge.className = `inline-flex text-[11px] font-bold uppercase tracking-wider px-3 py-1.5 rounded border ${colorClass}`;
    badge.textContent = ehRevisao ? `AGUARDANDO VALIDAÇÃO SÊNIOR` : `AÇÃO EXIGIDA: ${acao}`;
    
    // 🛡️ Alerta visual de competência futura no modal
    let alertaFuturoEl = document.getElementById('alertaCompetenciaFutura');
    if (!alertaFuturoEl) {
       alertaFuturoEl = document.createElement('div');
       alertaFuturoEl.id = 'alertaCompetenciaFutura';
       const modalAcaoArea = document.getElementById('modalAcaoArea');
       if (modalAcaoArea) modalAcaoArea.parentNode.insertBefore(alertaFuturoEl, modalAcaoArea.nextSibling);
    }
    const partesMA = String(mesAno || '').split('/');
    const mesCM = parseInt(partesMA[0]);
    const anoCM = parseInt(partesMA[1]);
    const agoraM = new Date();
    const ehFuturoModal = !isNaN(mesCM) && !isNaN(anoCM) && ((anoCM > agoraM.getFullYear()) || (anoCM === agoraM.getFullYear() && mesCM > agoraM.getMonth() + 1));
    if (ehFuturoModal) {
       alertaFuturoEl.className = 'bg-amber-50 border border-amber-300 rounded-lg p-3 mb-4 text-center shadow-sm';
       alertaFuturoEl.innerHTML = '<p class="text-[10px] font-black text-amber-700 uppercase tracking-widest flex items-center justify-center"><i class="fa-solid fa-triangle-exclamation mr-2 text-amber-500"></i> ATENÇÃO: Competência ' + mesAno + ' (Mês Seguinte)</p><p class="text-[10px] text-amber-600 mt-1">Confirme que esta é realmente a tarefa que deseja baixar.</p>';
       alertaFuturoEl.style.display = 'block';
    } else {
       alertaFuturoEl.style.display = 'none';
    }
    
    const linksContainer = document.getElementById('areaDocumentosRevisaoWeb');
    if (linksContainer) {
       linksContainer.innerHTML = '';
       if (ehRevisao && docLinks) {
          const links = docLinks.split('|');
          let htmlLinks = '<p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Documentos em Análise</p><div class="flex flex-col gap-2">';
          links.forEach((l, i) => {
             const url = l.trim();
             if (url) htmlLinks += `<a href="${url}" target="_blank" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 px-3 py-2 rounded-lg flex items-center shadow-sm w-full transition"><i class="fa-solid fa-file-contract mr-2"></i> ${links.length === 1 ? 'Acessar Documento Único' : 'Acessar Documento ' + (i+1)}</a>`;
          });
          htmlLinks += '</div>';
          linksContainer.innerHTML = htmlLinks;
          linksContainer.style.display = 'block';
       } else {
          linksContainer.style.display = 'none';
       }
    }
    
    precisaUploadWeb = (ehEnvio || ehAuditoria || exigeRevisao) && !ehRevisao;
    document.getElementById('areaUpload').style.display = precisaUploadWeb ? 'block' : 'none';
    
    // Justificativa: visível para ENVIAR (não AUDITAR) e COMUNICAR
    const areaJust = document.getElementById('areaJustificativaSemEnvio');
    if (areaJust) areaJust.style.display = ((ehEnvio && !ehAuditoria) || ehComunicar) && !ehRevisao ? 'block' : 'none';
    const txtJust = document.getElementById('textoJustificativaSemEnvio');
    if (txtJust) txtJust.value = '';
    
    const areaCom = document.getElementById('areaComunicacaoWeb');
    if (areaCom) areaCom.style.display = (ehComunicar && !ehRevisao) ? 'block' : 'none';
    
    const txtCom = document.getElementById('textoComunicarWeb');
    if (txtCom) txtCom.value = '';
    
    // Anotação de registro (somente para ARQUIVAR)
    const areaAnot = document.getElementById('areaAnotacaoArquivar');
    if (areaAnot) areaAnot.style.display = (ehArquivar && !ehRevisao) ? 'block' : 'none';
    const txtAnot = document.getElementById('textoAnotacaoArquivar');
    if (txtAnot) txtAnot.value = '';
    
    // Reset modal state
    arquivosStagedWeb = [];
    document.getElementById('fileInputObj').value = "";
    document.getElementById('fileListDisplayWeb').innerHTML = "";
    document.getElementById('modalFeedback').className = "hidden";
    
    const btnFin = document.getElementById('btnFinalizarWeb');
    
    if (ehRevisao) {
       if (isAdmin) {
          btnFin.disabled = false;
          btnFin.innerHTML = `<i class="fa-solid fa-stamp mr-2"></i> Validar e Encerrar Agora`;
          btnFin.className = "px-6 py-2 text-sm font-black bg-sky-600 hover:bg-sky-700 text-white rounded shadow-lg transition flex items-center uppercase tracking-widest";
          btnFin.onclick = aprovarTarefaWeb;
          
          // Exibir área de reprovação para Admin
          const areaMotivo = document.getElementById('areaMotivoReprovacao');
          if (areaMotivo) areaMotivo.style.display = 'block';
          const txtMotivo = document.getElementById('textoMotivoReprovacao');
          if (txtMotivo) txtMotivo.value = '';
          const btnReprov = document.getElementById('btnReprovarWeb');
          if (btnReprov) btnReprov.classList.remove('hidden');
       } else {
          btnFin.disabled = true;
          btnFin.innerHTML = `<i class="fa-solid fa-hourglass-half mr-2"></i> Em Revisão pelo Gerente`;
          btnFin.className = "px-6 py-2 text-sm font-bold bg-slate-200 text-slate-400 rounded cursor-not-allowed flex items-center";
          btnFin.onclick = null;
       }
    } else {
       btnFin.disabled = false;
       btnFin.innerHTML = `<i class="fa-solid fa-check mr-2"></i> Confirmar Fechamento`;
       btnFin.className = "px-6 py-2 text-sm font-bold bg-jp-navy hover:bg-indigo-700 text-white rounded shadow transition flex items-center";
       btnFin.onclick = finalizarProcessoWeb;
       
       // Ocultar área de reprovação para tarefas normais
       const areaMotivo = document.getElementById('areaMotivoReprovacao');
       if (areaMotivo) areaMotivo.style.display = 'none';
       const btnReprov = document.getElementById('btnReprovarWeb');
       if (btnReprov) btnReprov.classList.add('hidden');
    }

    // Show modal fade in

    const modal = document.getElementById('modalTarefa');
    const content = document.getElementById('modalTarefaContent');
    modal.classList.remove('hidden');
    
    setTimeout(() => { 
       modal.classList.remove('opacity-0'); 
       content.classList.remove('scale-95');
    }, 10);
}

/**
 * Acionada pelo Administrador para aprovar uma tarefa em REVISÃO.
 */
async function aprovarTarefaWeb() {
    if (!tarefaEmFoco || !tarefaEmFoco.id) return;
    
    const feedback = document.getElementById('modalFeedback');
    const btnFin = document.getElementById('btnFinalizarWeb');
    
    btnFin.disabled = true;
    btnFin.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Validando...`;
    
    feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-indigo-50 border-indigo-200 text-indigo-700 block";
    feedback.innerHTML = `<i class="fa-solid fa-stamp mr-2 text-indigo-500"></i> Comunicando aprovação ao servidor...`;
    
    google.script.run
      .withFailureHandler(err => {
         feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-red-50 border-red-200 text-red-700 block";
         feedback.textContent = "Erro na Aprovação: " + err.message;
         btnFin.disabled = false;
         btnFin.innerHTML = `<i class="fa-solid fa-stamp mr-2"></i> Tentar Validar Novamente`;
      })
      .withSuccessHandler(async urlWebApp => {
         try {
           const payload = {
             action: "aprovarTarefa",
             token: window.GIS_TOKEN,
             taskId: tarefaEmFoco.id
           };
           
           const resposta = await fetch(urlWebApp, {
             method: 'POST',
             body: JSON.stringify(payload),
             headers: { 'Content-Type': 'text/plain;charset=utf-8' }
           });
           
           const result = await resposta.json();
           if (result.success) {
             feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-emerald-50 border-emerald-200 text-emerald-700 block";
             feedback.innerHTML = `<i class="fa-solid fa-check-circle mr-2 text-emerald-500"></i> Sucesso! Tarefa aprovada e movida para o histórico.`;
             
             carregarDadosBase(); // Refresh data quietly
             setTimeout(() => { fecharModalTarefa(); }, 2000);
           } else {
             throw new Error(result.message);
           }
         } catch (errFetch) {
            feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-red-50 border-red-200 text-red-700 block";
            feedback.innerHTML = `<b>Erro:</b> ${errFetch.message}`;
            btnFin.disabled = false;
            btnFin.innerHTML = `<i class="fa-solid fa-rotate-right mr-2"></i> Tentar Novamente`;
         }
      }).getUrlParaFetch();
}

/**
 * Acionada pelo Administrador para REPROVAR (devolver) uma tarefa em REVISÃO.
 * Retorna a tarefa ao status PENDENTE para que o responsável corrija e reenvie.
 */
async function reprovarTarefaWeb() {
    if (!tarefaEmFoco || !tarefaEmFoco.id) return;
    
    const motivo = (document.getElementById('textoMotivoReprovacao') || {}).value || '';
    if (motivo.trim().length < 10) {
       const feedback = document.getElementById('modalFeedback');
       feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-amber-50 border-amber-200 text-amber-700 block";
       feedback.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> Informe o motivo da devolução (mínimo 10 caracteres).`;
       return;
    }
    
    const feedback = document.getElementById('modalFeedback');
    const btnReprov = document.getElementById('btnReprovarWeb');
    const btnFin = document.getElementById('btnFinalizarWeb');
    
    btnReprov.disabled = true;
    btnReprov.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Devolvendo...`;
    btnFin.disabled = true;
    
    feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-rose-50 border-rose-200 text-rose-700 block";
    feedback.innerHTML = `<i class="fa-solid fa-rotate-left mr-2 text-rose-500"></i> Comunicando devolução ao servidor...`;
    
    google.script.run
      .withFailureHandler(err => {
         feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-red-50 border-red-200 text-red-700 block";
         feedback.textContent = "Erro na Devolução: " + err.message;
         btnReprov.disabled = false;
         btnReprov.innerHTML = `<i class="fa-solid fa-rotate-left mr-2"></i> Tentar Devolver Novamente`;
         btnFin.disabled = false;
      })
      .withSuccessHandler(async urlWebApp => {
         try {
           const payload = {
             action: "reprovarTarefa",
             token: window.GIS_TOKEN,
             taskId: tarefaEmFoco.id,
             motivo: motivo.trim()
           };
           
           const resposta = await fetch(urlWebApp, {
             method: 'POST',
             body: JSON.stringify(payload),
             headers: { 'Content-Type': 'text/plain;charset=utf-8' }
           });
           
           const result = await resposta.json();
           if (result.success) {
             feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-amber-50 border-amber-200 text-amber-700 block";
             feedback.innerHTML = `<i class="fa-solid fa-rotate-left mr-2 text-amber-500"></i> Tarefa devolvida para correção com sucesso.`;
             
             carregarDadosBase(); // Refresh data quietly
             setTimeout(() => { fecharModalTarefa(); }, 2000);
           } else {
             throw new Error(result.message);
           }
         } catch (errFetch) {
            feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-red-50 border-red-200 text-red-700 block";
            feedback.innerHTML = `<b>Erro:</b> ${errFetch.message}`;
            btnReprov.disabled = false;
            btnReprov.innerHTML = `<i class="fa-solid fa-rotate-left mr-2"></i> Tentar Novamente`;
            btnFin.disabled = false;
         }
      }).getUrlParaFetch();
}

function dispararComunicadoGlobal() {
    const assunto = document.getElementById('inputAssuntoGlobal').value.trim();
    const texto = document.getElementById('textoComunicadoGlobal').value.trim();
    const check = document.getElementById('checkConfirmaGlobal').checked;
    const clienteAlvo = document.getElementById('selectClienteGlobal').value;
    const fb = document.getElementById('feedbackComunicadoGlobal');
    const btn = document.getElementById('btnDispararGlobal');
    const spinner = document.getElementById('spinnerGlobal');
    
    if (!assunto || !texto) {
        fb.innerHTML = "<i class='fa-solid fa-triangle-exclamation mr-1'></i> Preencha o assunto e a mensagem.";
        fb.className = "mt-4 text-center text-[11px] font-bold p-3 rounded shadow-sm border bg-amber-50 text-amber-700 border-amber-200";
        fb.classList.remove('hidden');
        return;
    }
    
    if (clienteAlvo === "ALL" && !check) {
        fb.innerHTML = "<i class='fa-solid fa-lock mr-1'></i> Confirme a operação na caixa de seleção.";
        fb.className = "mt-4 text-center text-[11px] font-bold p-3 rounded shadow-sm border bg-rose-50 text-rose-700 border-rose-200";
        fb.classList.remove('hidden');
        return;
    }
    
    fb.classList.add('hidden');
    btn.disabled = true;
    spinner.classList.remove('hidden');
    btn.innerHTML = `Processando...`;
    
    google.script.run
      .withFailureHandler(err => {
         btn.disabled = false;
         spinner.classList.add('hidden');
         btn.innerHTML = clienteAlvo === "ALL" ? `<i class="fa-solid fa-paper-plane mr-2"></i> Enviar a Todos` : `<i class="fa-solid fa-paper-plane mr-2"></i> Enviar para Cliente`;
         fb.innerHTML = `<i class="fa-solid fa-circle-xmark mr-1"></i> Erro: ${err.message}`;
         fb.className = "mt-4 text-center text-[11px] font-bold p-3 rounded shadow-sm border bg-rose-50 text-rose-700 border-rose-200";
         fb.classList.remove('hidden');
      })
      .withSuccessHandler(res => {
         spinner.classList.add('hidden');
         if (res.success) {
            btn.innerHTML = `<i class="fa-solid fa-check-double mr-2"></i> Enviado`;
            fb.innerHTML = `<i class="fa-solid fa-check-circle mr-1"></i> ${res.message}`;
            fb.className = "mt-4 text-center text-[11px] font-bold p-3 rounded shadow-sm border bg-emerald-50 text-emerald-700 border-emerald-200";
            fb.classList.remove('hidden');
            setTimeout(() => { 
                fecharModalComunicadoGlobal(); 
                btn.disabled = false; 
                btn.innerHTML = clienteAlvo === "ALL" ? `<i class="fa-solid fa-paper-plane mr-2"></i> Enviar a Todos` : `<i class="fa-solid fa-paper-plane mr-2"></i> Enviar para Cliente`; 
            }, 3000);
         } else {
            btn.disabled = false;
            btn.innerHTML = clienteAlvo === "ALL" ? `<i class="fa-solid fa-paper-plane mr-2"></i> Enviar a Todos` : `<i class="fa-solid fa-paper-plane mr-2"></i> Enviar para Cliente`;
            fb.innerHTML = `<i class="fa-solid fa-circle-xmark mr-1"></i> ${res.error}`;
            fb.className = "mt-4 text-center text-[11px] font-bold p-3 rounded shadow-sm border bg-rose-50 text-rose-700 border-rose-200";
            fb.classList.remove('hidden');
         }
      }).enviarComunicadoGlobalWeb(window.GIS_TOKEN, assunto, texto, clienteAlvo);
}

async function adicionarArquivosWeb() {
    const input = document.getElementById('fileInputObj');
    const fs = input.files;
    if (!fs || fs.length === 0) return;
    
    const feedback = document.getElementById('modalFeedback');
    feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-indigo-50 border-indigo-100 text-indigo-700 block";
    feedback.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Convertendo e preparando arquivos...`;
    
    try {
      const promessasLeitura = Array.from(fs).map(file => {
        return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = (e) => resolve({ name: file.name, base64: e.target.result.split(',')[1] });
          r.onerror = () => reject(new Error("Falha ao ler " + file.name));
          r.readAsDataURL(file);
        });
      });

      const novosArquivos = await Promise.all(promessasLeitura);
      arquivosStagedWeb = arquivosStagedWeb.concat(novosArquivos);
      renderizarListaArquivosWeb(); 
      feedback.className = "hidden";
    } catch (e) {
      feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-red-50 border-red-100 text-red-600 block";
      feedback.textContent = e.message;
    } finally {
      input.value = ""; 
    }
}

function removerArquivoWeb(index) {
    arquivosStagedWeb.splice(index, 1);
    renderizarListaArquivosWeb();
}

function renderizarListaArquivosWeb() {
    const box = document.getElementById('fileListDisplayWeb');
    if(arquivosStagedWeb.length === 0) {
        box.innerHTML = ''; return;
    }
    let html = '';
    arquivosStagedWeb.forEach((f, i) => {
        html += `
          <div class="flex justify-between items-center bg-white border border-slate-200 px-3 py-2 rounded shadow-sm">
             <span class="text-xs font-medium text-slate-600 truncate mr-2"><i class="fa-regular fa-file-pdf mr-2 text-indigo-400"></i>${f.name}</span>

    box.innerHTML = html;
}

/**
 * Exibe um alerta de confirmação personalizado com design premium e retorna uma Promise.
 */
function confirmarCustom(mensagem) {
    return new Promise((resolve) => {
        const modal = document.getElementById('modalConfirm');
        const content = document.getElementById('modalConfirmContent');
        const txt = document.getElementById('modalConfirmTexto');
        const btnSim = document.getElementById('btnConfirmSim');
        const btnNao = document.getElementById('btnConfirmCancelar');
        
        txt.textContent = mensagem;
        
        const fechar = (reposta) => {
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                resolve(reposta);
            }, 300);
        };
        
        btnSim.onclick = () => fechar(true);
        btnNao.onclick = () => fechar(false);
        
        // Exibe o modal
        modal.classList.remove('hidden');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-90');
        }, 10);
    });
}

async function finalizarProcessoWeb() {
    if(!tarefaEmFoco) return;
    const btnFinGuard = document.getElementById('btnFinalizarWeb');
    if (btnFinGuard && btnFinGuard.disabled) return;
    
    // 🛡️ TRAVA DE SEGURANÇA: Confirmação extra para competência futura
    if (tarefaEmFoco.mesAno && !tarefaEmFoco._futuroConfirmado) {
       const partesF = String(tarefaEmFoco.mesAno).split('/');
       const mesF = parseInt(partesF[0]);
       const anoF = parseInt(partesF[1]);
       const agoraF = new Date();
       const ehFuturo = !isNaN(mesF) && !isNaN(anoF) && ((anoF > agoraF.getFullYear()) || (anoF === agoraF.getFullYear() && mesF > agoraF.getMonth() + 1));
       if (ehFuturo) {
          const titulo = document.getElementById('modalConfirmTitulo');
          const texto = document.getElementById('modalConfirmTexto');
          const modal = document.getElementById('modalConfirm');
          const content = document.getElementById('modalConfirmContent');
          titulo.textContent = 'Competência Futura Detectada';
          texto.innerHTML = 'Esta tarefa é de competência <b>' + tarefaEmFoco.mesAno + '</b> (mês seguinte). Tem certeza que deseja fechar agora?';
          modal.classList.remove('hidden');
          void modal.offsetWidth;
          modal.classList.remove('opacity-0');
          content.classList.remove('scale-90');
          document.getElementById('btnConfirmCancelar').onclick = function() {
             modal.classList.add('opacity-0');
             content.classList.add('scale-90');
             setTimeout(() => modal.classList.add('hidden'), 300);
          };
          document.getElementById('btnConfirmSim').onclick = function() {
             modal.classList.add('opacity-0');
             content.classList.add('scale-90');
             setTimeout(() => modal.classList.add('hidden'), 300);
             tarefaEmFoco._futuroConfirmado = true;
             finalizarProcessoWeb();
          };
          return;
       }
    }
    
    const feedback = document.getElementById('modalFeedback');
    
    const textoComunicar = document.getElementById('textoComunicarWeb') ? document.getElementById('textoComunicarWeb').value.trim() : "";
    const acaoAtual = String(tarefaEmFoco.acao || "").toUpperCase().trim();

    if (acaoAtual.indexOf("COMUNICAR") > -1 && !textoComunicar) {
      const justTmp = document.getElementById('textoJustificativaSemEnvio') ? document.getElementById('textoJustificativaSemEnvio').value.trim() : "";
      if (justTmp.length < 10) {
        feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-orange-50 border-orange-200 text-orange-700 block";
        feedback.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> Escreva o comunicado ou preencha a justificativa abaixo (mínimo 10 caracteres).`;
        return;
      }
    }

    const justificativaSemEnvio = document.getElementById('textoJustificativaSemEnvio') ? document.getElementById('textoJustificativaSemEnvio').value.trim() : "";
    const ehEnvioAtual = acaoAtual.indexOf("ENVIAR") > -1;

    if (precisaUploadWeb && arquivosStagedWeb.length === 0) {
      if (ehEnvioAtual && justificativaSemEnvio.length >= 10) {
        // OK: prossegue sem arquivo, justificativa registrada
      } else if (ehEnvioAtual) {
        feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-orange-50 border-orange-200 text-orange-700 block";
        feedback.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> Sem arquivo anexado: preencha a justificativa abaixo (mínimo 10 caracteres).`;
        return;
      } else {
        feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-orange-50 border-orange-200 text-orange-700 block";
        feedback.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> Anexe os documentos mandatórios para avançar.`;
        return;
      }
    }
    
    const btnFin = document.getElementById('btnFinalizarWeb');
    btnFin.disabled = true;
    btnFin.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Enviando e Fechando...`;
    btnFin.className = "px-6 py-2 text-sm font-bold bg-slate-400 text-white rounded shadow flex items-center cursor-not-allowed";
    
    feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-indigo-50 border-indigo-200 text-indigo-700 block";
    feedback.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-2 text-indigo-500 text-lg align-middle"></i> Acessando nuvem (Motor REST via Planilha)...`;

    google.script.run
      .withFailureHandler(err => {
         feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-red-50 border-red-200 text-red-700 block";
         feedback.textContent = "Falha de Google Script Runtime: " + err.message;
         btnFin.disabled = false;
         btnFin.innerHTML = `<i class="fa-solid fa-check mr-2"></i> Confirmar Fechamento`;
         btnFin.className = "px-6 py-2 text-sm font-bold bg-jp-navy hover:bg-indigo-700 text-white rounded shadow transition flex items-center";
      })
      .withSuccessHandler(async urlWebApp => {
         let forcarUpload = false;
         let sucessoFinal = false;
         
         while (!sucessoFinal) {
           try {
             feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-indigo-50 border-indigo-200 text-indigo-700 block";
             feedback.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-2 text-indigo-500 text-lg align-middle"></i> ${forcarUpload ? 'Forçando Upload...' : 'Acessando nuvem (Motor REST)...'}`;

             const anotacaoArquivar = document.getElementById('textoAnotacaoArquivar') ? document.getElementById('textoAnotacaoArquivar').value.trim() : "";
             const payload = {
               action: "uploadBatch",
               token: window.GIS_TOKEN,
               arquivos: arquivosStagedWeb,
               mensagem: acaoAtual.indexOf("COMUNICAR") > -1 ? textoComunicar : "",
               taskId: tarefaEmFoco.id,
               clienteNome: tarefaEmFoco.cliente,
               forcar: forcarUpload,
               justificativaSemEnvio: ((ehEnvioAtual && arquivosStagedWeb.length === 0) || (acaoAtual.indexOf("COMUNICAR") > -1 && !textoComunicar)) ? justificativaSemEnvio : "",
               anotacao: anotacaoArquivar
             };
             
             const resposta = await fetch(urlWebApp, {
               method: 'POST',
               body: JSON.stringify(payload),
               headers: { 'Content-Type': 'text/plain;charset=utf-8' }
             });
             
             const result = await resposta.json();
             
             if (result.success) {
               feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-emerald-50 border-emerald-200 text-emerald-700 block";
               feedback.innerHTML = `<i class="fa-solid fa-check-circle mr-2 text-emerald-500"></i> Sucesso! Tarefa concluída e rotinas acionadas.`;
               
               if (result.dispararEmailVIP) {
                 google.script.run.processarAuditoriaRelatorioBackground(result.backgroundPayload);
               }
               
               carregarDadosBase(); // Refresh data quietly
               setTimeout(() => { fecharModalTarefa(); }, 2000);
               sucessoFinal = true;
               
             } else if (result.needsConfirmation) {
                // ⚠️ Alerta de OCR / CNPJ Divergente (AGORA PERSONALIZADO)
                const prosseguir = await confirmarCustom(result.message);
                
                if (prosseguir) {
                   forcarUpload = true; // Usuário confirmou, tenta de novo forçando
                } else {
                   // Usuário cancelou
                   btnFin.disabled = false;
                   btnFin.innerHTML = `<i class="fa-solid fa-check mr-2"></i> Confirmar Fechamento`;
                   btnFin.className = "px-6 py-2 text-sm font-bold bg-jp-navy hover:bg-indigo-700 text-white rounded shadow transition flex items-center";
                   feedback.className = "hidden";
                   return;
                }
             } else {
               throw new Error(result.error || result.message);
             }
           } catch (errFetch) {
              feedback.className = "mt-4 text-center text-xs font-semibold p-3 border rounded bg-red-50 border-red-200 text-red-700 block";
              feedback.innerHTML = `<i class="fa-solid fa-xmark mr-2 text-red-500"></i> <b>Erro:</b> ${errFetch.message}`;
              btnFin.disabled = false;
              btnFin.innerHTML = `<i class="fa-solid fa-rotate-right mr-2"></i> Tentar Novamente`;
              btnFin.className = "px-6 py-2 text-sm font-bold bg-orange-500 hover:bg-orange-600 text-white rounded shadow transition flex items-center";
              return;
           }
         }
      }).getUrlParaFetch();
}

/**
 * Função responsável por navegar (ocultar barras e exibir seções selecionadas)
 * @param {string} pageId - ID do contexto a ser exibido ('dashboard', 'tarefas'...)
 */
function navigate(pageId) {
    console.log("Navegando para rota interna: " + pageId);
    window.currentView = pageId;

    // Resetar pesquisas e limpar filtro visual ao trocar de tela
    if (document.getElementById('inputBuscaTarefas') && document.getElementById('inputBuscaTarefas').value) { document.getElementById('inputBuscaTarefas').value = ''; if (typeof filtrarTarefasWeb === 'function') filtrarTarefasWeb(); }
    if (document.getElementById('inputBuscaHistorico') && document.getElementById('inputBuscaHistorico').value) { document.getElementById('inputBuscaHistorico').value = ''; if (typeof filtrarHistoricoWeb === 'function') filtrarHistoricoWeb(); }
    if (document.getElementById('inputBuscaProtocolos') && document.getElementById('inputBuscaProtocolos').value) { document.getElementById('inputBuscaProtocolos').value = ''; if (typeof filtrarProtocolosHistorico === 'function') filtrarProtocolosHistorico(); }
    if (document.getElementById('inputBuscaSolicitacoes') && document.getElementById('inputBuscaSolicitacoes').value) { document.getElementById('inputBuscaSolicitacoes').value = ''; if (typeof filtrarSolicitacoesWeb === 'function') filtrarSolicitacoesWeb(); }
    if (document.getElementById('inputBuscaLogs') && document.getElementById('inputBuscaLogs').value) { document.getElementById('inputBuscaLogs').value = ''; if (typeof filtrarLogsWeb === 'function') filtrarLogsWeb(); }

    
    // 1. Tratamento Visual dos Botões na Sidebar
    const navButtons = document.querySelectorAll('.nav-btn');
    navButtons.forEach(btn => {
        // Remove active state
        btn.classList.remove('active');
        btn.classList.add('opacity-70', 'hover:bg-slate-800');
        
        // Add active se for o clicado
        if (btn.getAttribute('onclick').includes(pageId)) {
            btn.classList.add('active');
            btn.classList.remove('opacity-70', 'hover:bg-slate-800');
        }
    });

    // 2. Ocultar todas as seções `<section>`
    const sections = document.querySelectorAll('.view-section');
    sections.forEach(sec => {
        sec.classList.remove('active');
        sec.classList.add('hidden');
    });

    // 3. Exibir apenas a seção alvo
    const targetSection = document.getElementById('view-' + pageId);
    if (targetSection) {
        targetSection.classList.remove('hidden');
        targetSection.classList.add('active', 'fade-in'); // refaz a anim
    }
    
    // 4. Mudar Título do Topbar baseando-se no ID (Quick Transform)
    const titles = {
        'dashboard': 'Visão Geral (Dashboard)',
        'tarefas': 'Tarefas e Prioridades',
        'risco': 'Painel de Risco (Compliance)',
        'historico': 'Arquivo Morto e Auditoria',
        'protocolos': 'Gestão de Protocolos',
        'acessos': 'Gestão de Equipe e Atividade',
        'solicitacoes': 'Painel de Solicitações',
        'revisoes': 'Validação Sênior (Fila de Revisão)',
        'comunicacao': 'Comunicação Oficial e Relacionamento Interno',
        'admin': 'Robótica e Administração Geral'
    };
    document.getElementById('pageTitle').textContent = titles[pageId] || "Portal";
    
    // Gatilho Lazy Load
    if (pageId === 'risco' && !carregouRisco) { carregarRiscoServer(); }
    if (pageId === 'historico' && !carregouHistorico) { carregarHistoricoServer(); }
    if (pageId === 'protocolos' && !carregouProtocolos) { carregarProtocolosServer(); }
    if (pageId === 'solicitacoes' && !carregouSolicitacoes) { carregarSolicitacoesServer(); }
    if (pageId === 'acessos' && !carregouAcessos) { carregarAcessosServer(); }
    if (pageId === 'admin' && !carregouLogs) { carregarLogsServer(); }
}

function showToast(msg, type) {
   var existing = document.getElementById('toastReenvio');
   if (existing) existing.remove();
   var toast = document.createElement('div');
   toast.id = 'toastReenvio';
   var bgColor = type === 'success' ? 'bg-emerald-600' : 'bg-red-600';
   var icon = type === 'success' ? 'fa-check-circle' : 'fa-circle-xmark';
   toast.className = 'fixed top-4 right-4 z-[9999] ' + bgColor + ' text-white px-5 py-3 rounded-xl shadow-2xl text-[11px] font-bold uppercase tracking-widest flex items-center gap-2 animate-fadeIn';
   toast.innerHTML = '<i class="fa-solid ' + icon + '"></i>' + msg;
   document.body.appendChild(toast);
   setTimeout(function() { if (toast.parentNode) toast.remove(); }, 5000);
}
function reenviarPorProtocolo(protocolo, btn) {
   if (!confirm('Confirma o REENVIO do e-mail para o protocolo ' + protocolo + '?')) return;
   btn.disabled = true;
   var textoOriginal = btn.innerHTML;
   btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i>Enviando...';
   btn.className = "bg-slate-400 text-white text-[8px] font-bold px-3 py-1.5 rounded-lg shadow-sm uppercase tracking-wider cursor-not-allowed";
   google.script.run

// Helper: Extrai Date de string "dd/MM/yyyy" ou "dd/MM/yyyy HH:mm"
function _parseDataProtocolo(str) {
   if (!str) return null;
   const partesEspaco = String(str).trim().split(' ');
   const partesData = partesEspaco[0].split('/');
   if (partesData.length < 3) return null;
   
   const dt = new Date(parseInt(partesData[2],10), parseInt(partesData[1],10)-1, parseInt(partesData[0],10));
   
   // Se tiver hora (HH:mm), inclui na precisão do Date para ordenação correta
   if (partesEspaco.length > 1) {
      const partesHora = partesEspaco[1].split(':');
      if (partesHora.length >= 2) {
         dt.setHours(parseInt(partesHora[0], 10), parseInt(partesHora[1], 10), 0, 0);
      }
   }
   return dt;
}

// Helper: Verifica se a data é de um dia anterior a hoje
function _isProtocoloAnterior(dataStr) {
   var dt = _parseDataProtocolo(dataStr);
   if (!dt) return false;
   var hoje = new Date();
   hoje.setHours(0,0,0,0);
   return dt < hoje;
}

// Helper: Comparador para ordenar protocolos do mais antigo ao mais recente
function _compararDataProtocolo(a, b) {
   var dA = _parseDataProtocolo(a.data);
   var dB = _parseDataProtocolo(b.data);
   if (!dA) return -1;
   if (!dB) return 1;
   return dA - dB;
}

   if (todos && todos.length > 1) todos.sort((a, b) => _compararDataProtocolo(b, a));

// 🛡️ IDLE DETECTION: Controle de inatividade para precisão na contagem de tempo
let _ultimaInteracao = Date.now();
let _usuarioOcioso = false;
const TEMPO_LIMITE_OCIOSIDADE_MS = 600000; // 10 minutos sem interação = ocioso

function _registrarInteracaoUsuario() {
   _ultimaInteracao = Date.now();
   if (_usuarioOcioso) {
      _usuarioOcioso = false;
      const badge = document.getElementById('badgeIdleStatus');
      if (badge) badge.classList.add('hidden');
      console.log("▶️ Sessão retomada pelo usuário.");
   }
}

// Throttle para evitar excesso de chamadas em mousemove (máx 1x a cada 30s)
let _throttleTimer = null;
function _onInteracaoThrottled() {
   if (_throttleTimer) return;
   _registrarInteracaoUsuario();
   _throttleTimer = setTimeout(() => { _throttleTimer = null; }, 30000);
}

function _verificarOciosidade() {
   var tempoInativo = Date.now() - _ultimaInteracao;
   if (tempoInativo >= TEMPO_LIMITE_OCIOSIDADE_MS && !_usuarioOcioso) {
      _usuarioOcioso = true;
      // Exibe indicador visual discreto
      let badge = document.getElementById('badgeIdleStatus');
      if (!badge) {
         badge = document.createElement('div');
         badge.id = 'badgeIdleStatus';
         badge.className = 'fixed bottom-4 left-4 z-[9998] bg-amber-500 text-white px-4 py-2 rounded-xl shadow-lg text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 animate-fadeIn';
         badge.innerHTML = '<i class="fa-solid fa-moon"></i> Sessão pausada por inatividade';
         document.body.appendChild(badge);
      } else {
         badge.classList.remove('hidden');
      }
      console.log("⏸️ Usuário ocioso detectado. Heartbeat suspenso.");
   }
}

function initTelemetria() {
   console.log("📡 Iniciando Telemetria de Acesso (c/ Idle Detection)...");
   
   // Função de envio resiliente
   const enviarSinal = (tipo) => {
      google.script.run
         .withFailureHandler(err => console.error(`❌ Erro Telemetria (${tipo}):`, err))
         .withSuccessHandler(() => console.log(`✅ Sinal de atividade enviado: ${tipo}`))
         .registrarAtividadePortal(window.GIS_TOKEN, tipo);
   };

   // Registro inicial de entrada
   enviarSinal("ENTRADA");
   _ultimaInteracao = Date.now();
   
   // 🛡️ Listeners de interação real (throttled para performance)
   ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(function(evt) {
      document.addEventListener(evt, _onInteracaoThrottled, { passive: true });
   });
   
   // Sincronização inicial da badge de usuários online
   carregarAcessosServer(false, true);
   
   // Loop de Heartbeat a cada 5 minutos (CORRIGIDO: só grava se aba visível E usuário ativo)
   setInterval(() => {
      _verificarOciosidade();

      if (document.visibilityState === 'visible' && !_usuarioOcioso) {
         enviarSinal("HEARTBEAT");
      }
      
      // Atualização automática do Painel e da Badge na Sidebar (Background)
      carregarAcessosServer(false, true);
   }, 300000);

   // Verificação intermediária de ociosidade a cada 2 minutos (leve, só atualiza variável)
   setInterval(() => { _verificarOciosidade(); }, 120000);
}

function cobrarSolicitacao(solId, btnEl) {
   if (!solId || !btnEl) return;
   
   const oldHtml = btnEl.innerHTML;
   btnEl.disabled = true;
   btnEl.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
   btnEl.classList.add('opacity-50');

   google.script.run
     .withFailureHandler(err => {
        btnEl.disabled = false;
        btnEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
        btnEl.classList.remove('opacity-50', 'bg-amber-500');
        btnEl.classList.add('bg-red-500');
        console.error(err);
        setTimeout(() => { 
           btnEl.innerHTML = oldHtml;
           btnEl.classList.remove('bg-red-500');
           btnEl.classList.add('bg-amber-500');
        }, 3000);
     })
     .withSuccessHandler(res => {
        if (!res.success) {
           btnEl.disabled = false;
           btnEl.innerHTML = '<i class="fa-solid fa-xmark"></i>';
           btnEl.classList.remove('opacity-50', 'bg-amber-500');
           btnEl.classList.add('bg-orange-500');
           setTimeout(() => { 
              btnEl.innerHTML = oldHtml;
              btnEl.classList.remove('bg-orange-500');
              btnEl.classList.add('bg-amber-500');
           }, 3000);
           return;
        }
        
        btnEl.innerHTML = '<i class="fa-solid fa-check"></i>';
        btnEl.classList.remove('opacity-50', 'bg-amber-500');
        btnEl.classList.add('bg-emerald-500');
        
        // Recarrega silenciosamente em 2 segundos
        setTimeout(() => { carregarSolicitacoesServer(); }, 2000);
     }).cobrarSolicitacaoUnica(window.GIS_TOKEN, solId);
}

           btnEl.innerHTML = oldHtml;

     .withFailureHandler(err => {
        btnEl.disabled = false;
        btnEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
        btnEl.classList.remove('opacity-50', 'bg-teal-500');
        btnEl.classList.add('bg-red-500');
        showToast('Erro: ' + err.message, 'error');
        setTimeout(() => {
           btnEl.innerHTML = oldHtml;
           btnEl.classList.remove('bg-red-500');
           btnEl.classList.add('bg-teal-500');
        }, 3000);
     })
     .withSuccessHandler(res => {
        if (!res.success) {
           btnEl.disabled = false;
           btnEl.innerHTML = '<i class="fa-solid fa-xmark"></i>';
           btnEl.classList.remove('opacity-50', 'bg-teal-500');
           btnEl.classList.add('bg-orange-500');
           showToast(res.error || 'Falha na baixa manual.', 'error');
           setTimeout(() => {
              btnEl.innerHTML = oldHtml;
              btnEl.classList.remove('bg-orange-500');
              btnEl.classList.add('bg-teal-500');
           }, 3000);
           return;
        }
        btnEl.innerHTML = '<i class="fa-solid fa-check"></i>';
        btnEl.classList.remove('opacity-50', 'bg-teal-500');
        btnEl.classList.add('bg-emerald-500');
        showToast(res.message || 'Baixa manual efetuada!', 'success');
        carregouProtocolos = false;
        setTimeout(() => { carregarProtocolosServer(); }, 2000);
     }).baixarProtocoloManual(window.GIS_TOKEN, protocoloNum);
}
function abrirConteudoResposta(payload) {
    let texto = payload;
    let arquivos = "";
    
    if (payload.indexOf(" | ARQUIVOS: ") > -1) {
        const parts = payload.split(" | ARQUIVOS: ");
        texto = parts[0];
        arquivos = parts[1];
    }
    
    if (texto.startsWith("RESPOSTA:")) {
        texto = texto.substring(9).trim();
    }
    
    document.getElementById('textoVisualizarResposta').textContent = texto;
    
    const boxArquivos = document.getElementById('boxArquivosResposta');
    const linkArquivos = document.getElementById('linkArquivosResposta');
    
    if (arquivos && arquivos.trim().length > 0) {
        linkArquivos.href = arquivos.trim();
        boxArquivos.classList.remove('hidden');
    } else {
        boxArquivos.classList.add('hidden');
    }
    
    const modal = document.getElementById('modalVisualizarResposta');
    const content = document.getElementById('modalVisualizarRespostaContent');
    modal.classList.remove('hidden');
    
    setTimeout(() => { 
        modal.classList.remove('opacity-0'); 
        content.classList.remove('scale-95');
    }, 10);
}

function fecharModalVisualizarResposta() {
    const modal = document.getElementById('modalVisualizarResposta');
    const content = document.getElementById('modalVisualizarRespostaContent');
    
    modal.classList.add('opacity-0');
    content.classList.add('scale-95');
    
    setTimeout(() => {
        modal.classList.add('hidden');
    }, 300);
}

                view: 'protocolos'
            },
            {
                element: '#containerSolicitacoes',
                title: '6. Solicitações',
                intro: 'Gerencie pedidos feitos aos clientes. Veja respostas por texto ou anexo e cobre pendências.',
                view: 'solicitacoes'
            },
            {
                element: '#formDemandaWeb',
                title: '7. CRM - Demandas Internas',
                intro: 'Use este formulário para criar novas tarefas na esteira NCE. Defina o depto, a ação e o vencimento estratégico.',
                view: 'comunicacao'
            },
            {
                element: '#formSolicitarWeb',
                title: '8. CRM - Solicitação / Pendências',
                intro: 'O canal seguro para pedir documentos ao cliente. A mensagem é rastreada e gera protocolos automáticos.',
                view: 'comunicacao'
            },
            {
                element: '#txtLastSync',
                title: '9. Sincronização em Tempo Real',
                intro: 'O portal se mantém "vivo" conectando-se ao banco de dados a cada 30s. Aqui você vê a última atualização.',
                position: 'top'
            },
            {
                element: '#avatarUser',
                title: '10. Perfil e Privilégios',
                intro: 'Identifique seu e-mail e nível de acesso. A segurança é nossa prioridade máxima.',
                position: 'top'
            }
        ],
        nextLabel: 'Próximo →',
        prevLabel: '← Voltar',
        doneLabel: 'Concluir Tour',
        showProgress: true,
        showBullets: false,
        exitOnOverlayClick: false,
        tooltipClass: 'tour-premium-tooltip'
    });

    // Lógica de Sincronização e Navegação Automática
    tour.onbeforechange(function(targetElement) {
        // Esconde o tooltip temporariamente para evitar "ghosting" da mensagem antiga
        const tooltip = document.querySelector('.introjs-tooltip');
        if (tooltip) tooltip.style.opacity = '0';

        const step = this._options.steps[this._currentStep];
        if (step && step.view && window.currentView !== step.view) {
            navigate(step.view);
            
            // Retornamos uma Promise para o IntroJS esperar o carregamento
            return new Promise((resolve) => {
                let checkCount = 0;
                const checkInterval = setInterval(() => {
                    checkCount++;
                    // Se o container não tiver mais apenas o loader/skeleton, ou se passarem 5 segundos (timeout)
                    const containerId = 'container' + step.view.charAt(0).toUpperCase() + step.view.slice(1);
                    const container = document.getElementById(containerId);
                    const isLoaded = container && container.innerHTML.indexOf('fa-fade') === -1 && container.innerHTML.indexOf('skeleton') === -1;
                    
                    // Caso específico para CRM que é estático
                    const isCrm = step.view === 'comunicacao';

                    if (isLoaded || isCrm || checkCount > 20) {
                        clearInterval(checkInterval);
                        setTimeout(() => {
                            if (tooltip) tooltip.style.opacity = '1';
                            tour.refresh(); // Garante posição correta após mudança de DOM
                            resolve();
                        }, 400); // Buffer para estabilidade visual
                    }
                }, 200);
            });
        } else {
            if (tooltip) tooltip.style.opacity = '1';
        }
    });

    tour.oncomplete(function() {
        localStorage.setItem('jp_tour_done', 'true');
        const btnTour = document.getElementById('btnTourTutorial');
        if(btnTour) btnTour.classList.remove('btn-pulse');
    });

    tour.onexit(function() {
        if (isAuto) {
            localStorage.setItem('jp_tour_done', 'true');
            const btnTour = document.getElementById('btnTourTutorial');
            if(btnTour) btnTour.classList.remove('btn-pulse');
        }
    });

    tour.start();
}
