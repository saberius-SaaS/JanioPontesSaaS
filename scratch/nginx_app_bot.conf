server {
    server_name app.bot.janiopontes.com.br;

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }

    location /typebot-webhook {
        proxy_pass http://127.0.0.1:8002/webhook;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/app.bot.janiopontes.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.bot.janiopontes.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = app.bot.janiopontes.com.br) {
        return 301 https://$host$request_uri;
    }
    server_name app.bot.janiopontes.com.br;
    listen 80;
    return 404;
}
