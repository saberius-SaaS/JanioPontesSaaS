<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janio Pontes SaaS - Login</title>
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1C3051;
            --primary-light: #2A436A;
            --accent: #E3A01D; /* Dourado/Amarelo de destaque se houver */
            --bg-color: #F3F4F6;
            --surface: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #1C3051 0%, #0F172A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 420px;
            width: 100%;
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .logo {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 20px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: 700;
            box-shadow: 0 10px 15px -3px rgba(28, 48, 81, 0.3);
        }

        h1 {
            color: var(--text-main);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            min-height: 50px;
            margin-bottom: 2rem;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #E5E7EB;
        }

        .divider span {
            padding: 0 1rem;
        }

        .footer {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        /* Status Messages */
        #status-message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .status-error {
            background-color: #FEF2F2;
            color: #DC2626;
            border: 1px solid #FCA5A5;
        }

        .status-success {
            background-color: #F0FDF4;
            color: #16A34A;
            border: 1px solid #86EFAC;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .dashboard-preview {
            display: none;
            color: white;
            text-align: left;
            width: 100%;
            max-width: 800px;
        }
    </style>
</head>
<body>

    <!-- Tela de Login -->
    <div class="login-container" id="login-card">
        <div class="logo">JP</div>
        <h1>Bem-vindo de volta</h1>
        <p class="subtitle">Acesse o sistema de gestão do<br>Escritório Jânio Pontes</p>

        <!-- Elemento onde o botão do Google será renderizado -->
        <div class="google-btn-wrapper">
            <div id="g_id_onload"
                 data-client_id="471313311249-sda2g2e9m40l6ui02m1vut9i3glgu40m.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleCallback"
                 data-auto_prompt="false">
            </div>
            
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>

        <div class="divider">
            <span>Acesso Restrito</span>
        </div>

        <p class="footer">SaaS Multi-Tenant Architecture &copy; 2026</p>

        <div id="status-message"></div>
    </div>

    <!-- Script de Processamento -->
    <script>
        function showMessage(msg, type) {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = msg;
            statusEl.className = type === 'error' ? 'status-error' : 'status-success';
            statusEl.style.display = 'block';
        }

        // Função chamada pelo Google após o login bem-sucedido no popup
        async function handleGoogleCallback(response) {
            console.log("Token do Google recebido!");
            
            try {
                // Envia o token para o nosso backend validar e trocar pelo token interno
                const apiResponse = await fetch('/auth/google?token=' + response.credential, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await apiResponse.json();

                if (apiResponse.ok) {
                    showMessage("Login realizado com sucesso! Redirecionando...", "success");
                    
                    // Salva o JWT retornado pela nossa API
                    localStorage.setItem('access_token', data.access_token);
                    
                    // Simula redirecionamento
                    setTimeout(() => {
                        document.getElementById('login-card').innerHTML = `
                            <div class="logo" style="background:#10B981">✓</div>
                            <h1>Autenticado</h1>
                            <p class="subtitle">Token JWT salvo localmente. Você agora tem acesso à API protegida.</p>
                        `;
                    }, 1500);
                } else {
                    showMessage("Erro: " + (data.detail || "Não autorizado"), "error");
                }
            } catch (err) {
                console.error(err);
                showMessage("Erro de conexão com o servidor.", "error");
            }
        }
    </script>
</body>
</html>
