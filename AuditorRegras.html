<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; margin: 0; padding: 20px; color: #1E293B; }
      h2 { color: #1C3051; border-bottom: 2px solid #E65100; padding-bottom: 10px; font-size: 16px; font-weight: 800; text-transform: uppercase; }
      
      .table-container { 
        background: white; 
        border: 1px solid #E2E8F0; 
        border-radius: 8px; 
        overflow: hidden; 
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
        max-height: 500px;
        overflow-y: auto;
      }
      
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th { background: #1C3051; color: white; padding: 12px; text-align: left; font-weight: 600; position: sticky; top: 0; }
      td { padding: 10px 12px; border-bottom: 1px solid #F1F5F9; }
      tr:hover { background-color: #F8FAFC; }
      
      .badge { padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 10px; text-transform: uppercase; }
      .badge-green { background: #DCFCE7; color: #166534; }
      .badge-red { background: #FEE2E2; color: #991B1B; }
      .badge-orange { background: #FFEDD5; color: #9A3412; }
      .badge-blue { background: #DBEAFE; color: #1E40AF; }

      .loading { text-align: center; padding: 40px; color: #64748B; font-weight: 600; }
    </style>
  </head>
  <body>
    <h2>Auditoria de Geração de Regras</h2>
    <div id="conteudo" class="table-container">
      <div class="loading">Analisando regras para este cliente...</div>
    </div>
    
    <div style="text-align: right; margin-top: 15px;">
        <button onclick="google.script.host.close()" style="padding: 10px 20px; background: #1C3051; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 800;">FECHAR</button>
    </div>

    <script>
      var clienteIdx = <?= clienteIndex ?>;
      
      window.onload = function() {
        google.script.run.withSuccessHandler(renderizarRelatorio).getRelatorioAuditoria(clienteIdx);
      };

      function renderizarRelatorio(dados) {
        if (!dados || dados.length === 0) {
           document.getElementById('conteudo').innerHTML = '<div class="loading">Nenhuma regra encontrada ou erro na leitura.</div>';
           return;
        }

        var html = '<table><thead><tr><th>Regra (Obrigação)</th><th>Status</th><th>Motivo / Detalhe</th></tr></thead><tbody>';
        
        dados.forEach(function(item) {
          var badgeClass = "badge-green";
          if (item.cor === "red") badgeClass = "badge-red";
          if (item.cor === "orange") badgeClass = "badge-orange";
          if (item.cor === "blue") badgeClass = "badge-blue";
          
          html += '<tr>';
          html += '<td><b>' + item.regra + '</b></td>';
          html += '<td><span class="badge ' + badgeClass + '">' + item.status + '</span></td>';
          html += '<td style="color:#475569;">' + item.detalhe + '</td>';
          html += '</tr>';
        });
        
        html += '</tbody></table>';
        document.getElementById('conteudo').innerHTML = html;
      }
    </script>
  </body>
</html>
